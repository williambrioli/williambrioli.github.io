    content: `

<p>Existe uma pergunta silenciosa que acompanha muitas pessoas mesmo nos dias aparentemente normais: “Minha vida faz sentido?”. Às vezes ela aparece depois de uma perda. Outras vezes surge no trânsito, no silêncio do quarto, no cansaço de uma rotina automática ou até em um momento feliz que, paradoxalmente, parece vazio. Vivemos uma era hiperconectada, cheia de telas, notificações e distrações, mas profundamente marcada pela sensação de desconexão interior. E talvez uma das maiores dificuldades da vida moderna seja justamente esta: saber viver sem apenas sobreviver.</p>

<p>Quando alguém pergunta “Tudo bem?”, quase sempre respondemos automaticamente “Tudo bem”. Mas se alguém perguntasse “Como vai você, de verdade?”, talvez a resposta fosse diferente. Talvez muitas pessoas simplesmente respondessem: “Não sei”. Porque no fundo, há dias em que realmente não sabemos. Não sabemos se estamos felizes, se estamos vivendo uma vida boa, se estamos apenas funcionando ou verdadeiramente vivendo.</p>

<p>Os filósofos gregos já se debruçavam sobre essa inquietação há milhares de anos. Sócrates dizia que “uma vida não examinada não vale a pena ser vivida”. Aristóteles buscava compreender o que seria a felicidade verdadeira. Séculos depois, Viktor Frankl, sobrevivente dos campos de concentração nazistas, escreveu que quem encontra um sentido suporta quase qualquer sofrimento. Contardo Calligaris também provoca uma reflexão importante ao lembrar que a busca pelo sentido da vida não é um luxo intelectual, mas uma necessidade profundamente humana.</p>

<p>A questão talvez nunca tenha sido apenas “como ser feliz”, mas sim: “Como viver de forma inteira?”.</p>

<h2>Explicação científica simplificada</h2>

<p>A psicologia contemporânea, a filosofia e até as neurociências convergem em um ponto importante: o ser humano precisa de sentido existencial para sustentar sua saúde emocional. Não se trata apenas de prazer imediato ou satisfação momentânea. O cérebro humano responde positivamente quando percebe coerência, pertencimento, propósito e vínculos significativos.</p>

<p>Na psicologia existencial, autores como Viktor Frankl mostram que a ausência de sentido pode gerar vazio existencial, sensação de apatia, angústia e desconexão emocional. Frankl percebeu, durante sua experiência extrema nos campos de concentração, que pessoas que conseguiam manter algum propósito interno apresentavam maior resistência emocional diante do sofrimento.</p>

<p>A ciência psicológica atual também diferencia prazer de realização. O prazer costuma ser imediato, rápido e passageiro. Já a sensação de plenitude está relacionada à construção de significado ao longo do tempo. Isso ajuda a compreender por que tantas pessoas vivem momentos prazerosos e, ainda assim, sentem um vazio persistente.</p>

<p>Aristóteles, em sua obra <em>Ética a Nicômaco</em>, utilizava o conceito de “eudaimonia”, frequentemente traduzido como felicidade, mas que se aproxima mais da ideia de florescimento humano. Para ele, felicidade não era um estado emocional temporário, mas uma forma de viver alinhada à virtude, ao equilíbrio e à realização das potencialidades humanas.</p>

<p>Os gregos entendiam que a felicidade não dependia apenas da vontade individual. Ela também estava relacionada à ordem do mundo, às relações humanas, à ética e à forma como alguém conduzia sua existência. Por isso, existia uma provocação filosófica importante: “Um morto pode ser feliz?”.</p>

<p>A pergunta parece estranha à primeira vista, mas carrega uma profundidade enorme. Para os gregos, só era possível avaliar plenamente se alguém viveu bem ao final da vida. Isso porque a felicidade não era um instante isolado, mas a construção inteira de uma existência.</p>

<p>Essa visão confronta diretamente a lógica atual das redes sociais, onde felicidade muitas vezes é reduzida a imagens instantâneas, consumo, performance e validação externa.</p>

<p>Hoje, a ciência também demonstra que relações humanas saudáveis são um dos principais fatores de proteção emocional. O famoso Estudo de Harvard sobre Desenvolvimento Adulto, um dos mais longos já realizados sobre felicidade humana, concluiu que vínculos afetivos de qualidade são mais determinantes para bem-estar do que dinheiro, fama ou status.</p>

<p>Isso reforça uma ideia antiga e profundamente atual: felicidade não é isolamento. Não é apenas produtividade. Não é viver conectado ao celular e desconectado da própria existência. Uma vida plena acontece no encontro, na presença, na construção concreta da realidade cotidiana.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, muitas pessoas chegam à psicoterapia dizendo frases como:</p>

<ul>
  <li>“Minha vida perdeu o sentido.”</li>
  <li>“Eu faço tudo certo, mas continuo vazio.”</li>
  <li>“Não sei mais quem eu sou.”</li>
  <li>“Tenho tudo, mas não consigo sentir felicidade.”</li>
</ul>

<p>Essas falas revelam algo importante: sofrimento emocional nem sempre nasce apenas de traumas evidentes. Muitas vezes ele surge da desconexão entre a pessoa e sua própria existência.</p>

<p>Vivemos em uma sociedade extremamente acelerada, onde as pessoas aprenderam a produzir antes mesmo de aprender a sentir. Muitos cresceram ouvindo que precisavam ser fortes, eficientes, bem-sucedidos e úteis. Porém, quase ninguém ensinou como habitar a própria vida com profundidade.</p>

<p>A metáfora do “piloto automático” ajuda bastante aqui. Imagine alguém dirigindo por horas sem perceber a paisagem, sem sentir o caminho e sem sequer lembrar por que começou a viagem. Assim vivem muitas pessoas emocionalmente: executando tarefas, cumprindo agendas, respondendo mensagens, trabalhando sem pausa, mas profundamente distantes de si mesmas.</p>

<p>É nesse ponto que o vazio existencial costuma aparecer.</p>

<p>O sofrimento contemporâneo não é apenas excesso de dor. Muitas vezes é excesso de superficialidade. Excesso de estímulo. Excesso de distração. E ausência de silêncio interno.</p>

<p>Contardo Calligaris traz reflexões importantes sobre isso ao discutir como o sujeito moderno frequentemente tenta preencher sua existência com consumo, reconhecimento externo ou padrões sociais que não necessariamente correspondem aos seus desejos mais autênticos.</p>

<p>Do ponto de vista psicológico, uma vida plena não significa ausência de sofrimento. Isso é fundamental. A ideia de felicidade permanente é uma fantasia moderna extremamente adoecedora.</p>

<p>Uma vida boa inclui frustrações, perdas, dúvidas, medo e impermanência. A questão não é eliminar o sofrimento, mas desenvolver capacidade emocional para atravessá-lo sem perder completamente o sentido da existência.</p>

<p>Os gregos falavam muito sobre equilíbrio. Aristóteles chamava isso de “justa medida”. Nem excesso, nem falta. Nem impulsividade total, nem rigidez absoluta. A plenitude surge no equilíbrio possível entre razão, emoção, ética e realidade.</p>

<p>Esse conceito dialoga profundamente com saúde mental hoje.</p>

<p>Muitas pessoas adoecem porque vivem em extremos:</p>

<ul>
  <li>Trabalho sem descanso.</li>
  <li>Prazer sem profundidade.</li>
  <li>Conexão digital sem vínculo humano real.</li>
  <li>Produtividade sem significado.</li>
  <li>Distração sem presença.</li>
</ul>

<p>Existe uma diferença enorme entre estar ocupado e estar vivo.</p>

<p>Também é importante compreender que felicidade não é um produto final que alguém alcança definitivamente. Ela é construída em pequenas experiências concretas:</p>

<ul>
  <li>Conversas sinceras.</li>
  <li>Sentimento de pertencimento.</li>
  <li>Capacidade de amar e ser amado.</li>
  <li>Sensação de coerência interna.</li>
  <li>Propósito alinhado com valores pessoais.</li>
  <li>Presença emocional no cotidiano.</li>
</ul>

<p>Viktor Frankl dizia que o sentido não é inventado de forma abstrata; ele é descoberto na própria experiência concreta da vida.</p>

<p>Isso significa que o sentido não aparece apenas em grandes conquistas. Muitas vezes ele nasce em gestos simples: cuidar de alguém, criar algo significativo, atravessar uma dor com dignidade, construir vínculos verdadeiros ou simplesmente aprender a estar presente no agora.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Embora a questão do sentido da vida seja profunda e filosófica, ela também possui aplicações práticas no cotidiano emocional.</p>

<ul>
  <li><strong>Reduza o excesso de estímulos:</strong> o cérebro humano não foi feito para viver em hiperestimulação constante. Silêncio, pausa e descanso emocional são necessários para reflexão existencial.</li>

  <li><strong>Observe se sua rotina tem coerência:</strong> muitas vezes o sofrimento surge quando existe uma distância muito grande entre quem a pessoa é e a forma como está vivendo.</li>

  <li><strong>Fortaleça vínculos reais:</strong> presença emocional vale mais do que quantidade de contatos digitais. Relações profundas funcionam como proteção psicológica.</li>

  <li><strong>Questione seus próprios padrões:</strong> alguns desejos são genuínos; outros foram apenas aprendidos socialmente.</li>

  <li><strong>Aprenda a sustentar o vazio sem fugir imediatamente:</strong> nem todo desconforto precisa ser anestesiado com distração, consumo ou excesso de produtividade.</li>

  <li><strong>Pratique presença:</strong> viver no automático reduz a percepção da própria existência. Pequenos momentos conscientes ajudam a restaurar conexão interna.</li>

  <li><strong>Reflita sobre seus valores:</strong> felicidade duradoura costuma estar ligada à coerência ética entre escolhas e princípios pessoais.</li>

  <li><strong>Aceite a impermanência:</strong> parte do sofrimento humano nasce da tentativa de controlar completamente a vida.</li>
</ul>

<p>Existe também uma metáfora muito interessante para pensar o sentido da vida: a vida não funciona como uma linha reta, mas como uma travessia marítima.</p>

<p>Quem atravessa o oceano sabe que o mar nunca permanece igual. Há calmaria, tempestade, vento favorável e momentos difíceis. O problema é que muitas pessoas acreditam que felicidade significa ausência completa de tempestades. Mas maturidade emocional talvez seja justamente aprender a navegar sem exigir que o mar fique sempre calmo.</p>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia pode ser um espaço importante para pessoas que sentem vazio existencial, desconexão emocional ou dificuldade em encontrar sentido na própria vida.</p>

<p>Muitas vezes, o processo terapêutico ajuda a pessoa a perceber que ela passou anos vivendo expectativas externas: tentando agradar, corresponder, performar ou sobreviver emocionalmente.</p>

<p>Na terapia, perguntas profundas começam a surgir:</p>

<ul>
  <li>Quem eu sou além das minhas funções?</li>
  <li>O que realmente importa para mim?</li>
  <li>Que tipo de vida estou construindo?</li>
  <li>Quais dores eu nunca consegui elaborar?</li>
  <li>Estou vivendo ou apenas funcionando?</li>
</ul>

<p>Essas perguntas podem gerar medo inicialmente, porque mexem com estruturas internas profundas. Porém, também podem abrir espaço para uma vida mais consciente e autêntica.</p>

<p>A psicoterapia não entrega respostas prontas sobre o sentido da vida. Mas ela pode ajudar alguém a construir uma relação mais verdadeira consigo mesmo.</p>

<p>Isso inclui:</p>

<ul>
  <li>Reconhecer emoções reprimidas.</li>
  <li>Compreender padrões repetitivos.</li>
  <li>Desenvolver consciência emocional.</li>
  <li>Resgatar autenticidade.</li>
  <li>Fortalecer vínculos.</li>
  <li>Reconstruir propósito.</li>
  <li>Aprender a sustentar a própria existência com mais presença.</li>
</ul>

<p>Para líderes e profissionais que carregam alta responsabilidade, essa reflexão é ainda mais importante. Muitas pessoas ocupam posições de liderança enquanto emocionalmente estão esgotadas, desconectadas ou vivendo apenas em função de resultados.</p>

<p>Sem conexão com propósito, até o sucesso pode se tornar vazio.</p>

<p>Uma vida plena não significa abandonar ambições ou responsabilidades. Significa não perder a própria humanidade no caminho.</p>

<p>Talvez a pergunta mais importante não seja “Como alcançar felicidade?”, mas sim:</p>

<p><em>“Como posso viver de forma suficientemente verdadeira comigo mesmo?”</em></p>

<h2>Conclusão</h2>

<p>A busca pelo sentido da vida acompanha a humanidade desde os gregos antigos até os dias atuais. Apesar das mudanças tecnológicas e sociais, algumas perguntas continuam essencialmente humanas.</p>

<p>O que faz uma vida valer a pena?</p>

<p>O que significa viver bem?</p>

<p>O que realmente permanece quando o excesso de distrações desaparece?</p>

<p>Talvez felicidade não seja um estado permanente de prazer, mas a capacidade de viver com presença, vínculo, coerência e significado.</p>

<p>Talvez uma vida plena não seja perfeita, mas profundamente habitada.</p>

<p>A existência humana inclui perdas, dúvidas, medos e finitude. Porém, também inclui encontros, construção de sentido, amor, aprendizado e transformação.</p>

<p>Como lembrava Viktor Frankl, o ser humano pode suportar quase qualquer “como” quando encontra um “porquê”.</p>

<p>E talvez o sentido da vida não esteja em descobrir uma resposta definitiva, mas em aprender a viver de maneira mais consciente, inteira e humana enquanto a história ainda está sendo escrita.</p>

      <button type="button" class="btn" id="postModalWhatsApp"></button>
      <!-- Botão do WhatsApp dentro do modal (texto vem do SITE_DATA) -->

      <button type="button" class="btn" id="postModalCloseBottom"></button>
      <!-- Botão "Fechar" no rodapé do modal (texto vem do SITE_DATA) -->
    </footer>
  </article>
</div>


<!-- ============================
     SCRIPT PRINCIPAL DO ARTIGO
     ============================ -->
<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);


/* ==========================================
   INICIALIZAÇÃO GERAL DA PÁGINA
   ========================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadPosts();
});

/* ==========================================
   CONFIGURA SEO E INSERE CONTEÚDO DO ARTIGO
   ========================================== */
document.addEventListener("DOMContentLoaded", () => {
  // SEO
  document.title = ARTICLE.title + " | William Brioli";
  document.getElementById("metaTitle").textContent = ARTICLE.title;
  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
</script>
