<p>Você já teve a sensação de estar perdendo uma discussão… dentro da própria mente? Uma situação pequena acontece — uma crítica, um erro, um silêncio — e, de repente, sua cabeça começa a criar diálogos automáticos, muitas vezes negativos, repetitivos e difíceis de controlar. Em poucos minutos, aquilo que era simples ganha uma proporção emocional intensa. Esse é o cenário descrito por muitas pessoas que buscam compreender suas emoções: não é o mundo externo que mais machuca, mas a forma como ele é interpretado internamente. É exatamente nesse ponto que o conceito de autocontrole emocional, popularizado por Augusto Cury, encontra respaldo em evidências científicas modernas sobre cognição, linguagem interna e regulação emocional.</p>

<h2>Explicação científica simplificada</h2>
<p>Do ponto de vista científico, o que Augusto Cury chama de “diálogo interno” encontra base em conceitos amplamente estudados na psicologia cognitiva, como pensamentos automáticos e reestruturação cognitiva, descritos por Aaron Beck. Esses pensamentos são interpretações rápidas que fazemos sobre situações, muitas vezes sem consciência, e que influenciam diretamente nossas emoções e comportamentos.</p>

<p>A neurociência demonstra que estruturas como a amígdala cerebral estão envolvidas na resposta emocional imediata, especialmente em situações de ameaça ou estresse, enquanto o córtex pré-frontal atua na regulação dessas respostas. Quando não há intervenção consciente, a tendência é que respostas emocionais automáticas dominem o comportamento.</p>

<p>Além disso, estudos sobre regulação emocional mostram que a capacidade de reinterpretar uma situação — chamada de reavaliação cognitiva — está associada a menor ansiedade, melhor tomada de decisão e maior equilíbrio emocional. Esse processo é semelhante ao que Cury propõe ao incentivar o indivíduo a questionar seus próprios pensamentos.</p>

<p>Dentro da Programação Neurolinguística (PNL), o diálogo interno também é considerado uma das principais estruturas de influência sobre estados emocionais. A forma como uma pessoa “fala consigo mesma” pode amplificar ou reduzir emoções como medo, insegurança e ansiedade. Já na Comunicação Não Violenta (CNV), desenvolvida por Marshall Rosenberg, o foco está na consciência dos sentimentos e necessidades por trás dos pensamentos, promovendo um diálogo interno mais empático e menos julgador.</p>

<h2>Análise profissional aplicada ao tema</h2>
<p>O livro “Autocontrole: Vença os Fantasmas da Emoção” propõe oito ferramentas de gestão do diálogo interno. Embora apresentadas em linguagem acessível, elas dialogam com práticas terapêuticas reconhecidas.</p>

<p>A primeira ferramenta envolve duvidar dos pensamentos automáticos. Na prática clínica, isso se aproxima da identificação de distorções cognitivas, como generalização e catastrofização. A segunda ferramenta propõe criticar pensamentos negativos, o que corresponde à análise racional dessas ideias.</p>

<p>A terceira ferramenta sugere determinar a emoção antes de reagir, algo alinhado à consciência emocional. A quarta envolve nomear sentimentos, prática amplamente utilizada em abordagens como a Terapia Cognitivo-Comportamental e a própria CNV.</p>

<p>A quinta ferramenta trata de reescrever mentalmente experiências negativas, o que se relaciona à reestruturação cognitiva. A sexta propõe escolher respostas mais inteligentes emocionalmente, fortalecendo o autocontrole.</p>

<p>A sétima ferramenta aborda a importância de desacelerar o pensamento, o que tem relação com práticas de atenção plena (mindfulness). Já a oitava ferramenta envolve treinar continuamente o diálogo interno, consolidando novos padrões mentais.</p>

<p>Quando conectamos essas ferramentas com a PNL, percebemos que há um reforço na ideia de que o estado emocional pode ser alterado pela linguagem interna. Técnicas como ancoragem e mudança de submodalidades trabalham exatamente essa reprogramação interna. Já na CNV, o foco complementa esse processo ao trazer compaixão e compreensão, evitando que o diálogo interno se torne excessivamente crítico ou punitivo.</p>

  <li>Nomeie suas emoções com precisão: ansiedade, frustração, medo ou insegurança.</li>
  <li>Reescreva mentalmente situações difíceis buscando aprendizados em vez de julgamentos.</li>
  <li>Utilize pausas conscientes antes de reagir emocionalmente.</li>
  <li>Pratique um diálogo interno mais compassivo, evitando autocrítica excessiva.</li>
  <li>Use princípios da CNV para entender quais necessidades estão por trás das emoções.</li>
  <li>Treine diariamente pequenas mudanças no pensamento para criar novos padrões mentais.</li>
</ul>

<h2>Pontes para psicoterapia</h2>
<p>Pessoas que enfrentam ansiedade, pensamentos repetitivos ou dificuldade em lidar com emoções intensas podem se beneficiar significativamente da psicoterapia. O processo terapêutico ajuda a tornar conscientes os padrões de pensamento automático, permitindo que o indivíduo desenvolva novas formas de interpretar e responder às situações.</p>

<p>Abordagens como a Terapia Cognitivo-Comportamental trabalham diretamente com reestruturação de pensamentos, enquanto práticas integrativas podem incluir elementos de atenção plena e regulação emocional. A CNV pode ser incorporada para melhorar o relacionamento consigo mesmo, reduzindo autocrítica e aumentando a autocompreensão.</p>

<p>Ao integrar essas abordagens com as ferramentas propostas por Augusto Cury, o processo terapêutico se torna ainda mais prático e aplicável no dia a dia, fortalecendo o desenvolvimento emocional e o autocontrole.</p>

<h2>Conclusão</h2>
<p>O autocontrole emocional não significa eliminar emoções, mas aprender a dialogar com elas. O que Augusto Cury propõe, e que a ciência reforça, é que a forma como interpretamos nossas experiências tem um impacto direto na nossa saúde mental.</p>

<p>Desenvolver um diálogo interno consciente é um processo contínuo, que exige prática, atenção e, muitas vezes, apoio profissional. Ao integrar conceitos da psicologia, da PNL e da Comunicação Não Violenta, é possível construir uma relação mais saudável consigo mesmo, reduzindo a ansiedade e aumentando a clareza emocional.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
