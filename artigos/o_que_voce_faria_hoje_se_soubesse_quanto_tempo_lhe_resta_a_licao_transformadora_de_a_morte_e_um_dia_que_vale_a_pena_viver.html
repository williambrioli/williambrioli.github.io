// 📝 Conteúdo do artigo (TEXTO DO ARTIGO FICA AQUI) /*
        
    content: `



<p>Imagine receber uma notícia que mudasse completamente sua percepção do tempo. Talvez um diagnóstico grave, a perda inesperada de alguém ou simplesmente a consciência de que a vida é limitada. O que mudaria na forma como você vive hoje? Quais preocupações deixariam de parecer tão importantes? Quais pessoas receberiam mais do seu tempo? E quais sonhos finalmente sairiam do papel?</p>

<p>Essas perguntas podem causar desconforto, mas também carregam um enorme potencial transformador. Em <em>A morte é um dia que vale a pena viver</em>, a médica geriatra e escritora Ana Claudia Quintana Arantes convida o leitor a refletir sobre a finitude não como um convite ao medo, mas como um caminho para viver com mais consciência, presença e significado. Paradoxalmente, quando aceitamos que a vida tem um fim, passamos a enxergar melhor aquilo que realmente importa.</p>

<p>A morte continua sendo um dos temas mais evitados pela sociedade. No entanto, ignorá-la não elimina sua existência. Ao contrário, muitas vezes nos faz desperdiçar tempo vivendo no piloto automático, adiando conversas importantes, projetos significativos e o cuidado com nossa própria saúde emocional.</p>

<h2>Explicação científica simplificada</h2>

<p>Na psicologia, refletir sobre a própria finitude não significa desenvolver pessimismo. Diversas abordagens reconhecem que a consciência da mortalidade pode favorecer mudanças positivas na maneira como uma pessoa organiza sua vida, seus relacionamentos e seus valores.</p>

<p>A Psicologia Existencial propõe que reconhecer os limites da existência humana ajuda a construir uma vida mais autêntica. Em vez de viver apenas para cumprir expectativas externas, a pessoa passa a questionar quais escolhas realmente fazem sentido para sua história.</p>

<p>Também sabemos que o cérebro humano possui uma tendência natural de evitar pensamentos relacionados à morte. Esse mecanismo funciona como proteção emocional em muitos momentos. Entretanto, quando a finitude é completamente negada, também pode surgir a ilusão de que sempre haverá tempo para resolver conflitos, demonstrar afeto ou buscar mudanças importantes.</p>

<p>A proposta apresentada por Ana Claudia Quintana Arantes é justamente inverter essa lógica. Ao aceitar que o tempo é limitado, cada decisão ganha mais valor. Assim como um livro se torna precioso porque possui um último capítulo, nossa vida também encontra significado justamente porque não é infinita.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, é comum observar pessoas profundamente angustiadas não apenas pelos problemas atuais, mas pelas escolhas que deixaram de fazer ao longo da vida. Muitas adiaram sonhos, permaneceram em relacionamentos destrutivos, negligenciaram sua saúde mental ou viveram décadas tentando corresponder às expectativas de outras pessoas.</p>

<p>Quando a consciência da finitude aparece — seja por uma perda, um adoecimento ou uma crise existencial — muitos desses pacientes passam a revisar suas prioridades. Perguntas como "Estou vivendo a vida que realmente desejo?" ou "Se meu tempo fosse limitado, continuaria fazendo as mesmas escolhas?" tornam-se frequentes.</p>

<p>Essa reflexão não busca gerar medo, mas ampliar a consciência. Em muitos casos, ela representa o início de mudanças importantes: reconstrução de vínculos familiares, busca por equilíbrio entre trabalho e vida pessoal, desenvolvimento do autocuidado e procura por psicoterapia.</p>

<p>A metáfora da ampulheta ajuda a compreender esse processo. Não conseguimos interromper a areia que cai, mas podemos escolher como utilizar cada grão de tempo disponível. A qualidade da vida não depende apenas da quantidade de anos vividos, mas da presença com que experimentamos cada etapa da caminhada.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Pergunte a si mesmo quais pessoas são realmente importantes e se elas têm recebido seu tempo e sua atenção.</li>

<li>Reflita sobre quais atividades ocupam sua rotina apenas por obrigação e quais estão alinhadas aos seus valores.</li>

<li>Não adie conversas importantes por orgulho ou medo. Em muitos casos, o momento mais adequado é o presente.</li>

<li>Reserve tempo para cuidar da saúde física e emocional antes que o sofrimento se torne intenso.</li>

<li>Pratique momentos de presença, reduzindo o excesso de distrações e valorizando experiências simples do cotidiano.</li>

<li>Permita-se revisar antigos objetivos. Crescer também significa mudar prioridades.</li>

<li>Lembre-se de que dizer "sim" para tudo pode significar dizer "não" para aquilo que realmente importa.</li>

<li>Construa uma rotina coerente com seus valores, e não apenas com as expectativas externas.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia oferece um espaço seguro para refletir sobre temas que muitas vezes evitamos, como perdas, envelhecimento, sentido da vida e finitude. Em vez de estimular pensamentos negativos, esse processo favorece maior clareza sobre prioridades, valores e objetivos pessoais.</p>

<p>Ao longo do acompanhamento terapêutico, muitas pessoas descobrem que seu sofrimento não está apenas relacionado aos acontecimentos da vida, mas também à forma como se relacionam com o tempo, com as escolhas e consigo mesmas.</p>

<p>A terapia auxilia na elaboração de lutos, na ressignificação de experiências difíceis, na construção de relacionamentos mais saudáveis e no desenvolvimento de uma vida mais coerente com aquilo que realmente importa para cada indivíduo.</p>

<p>Quando aprendemos a olhar para a finitude sem negar sua existência, frequentemente passamos a viver com mais autenticidade, gratidão e responsabilidade pelas escolhas que fazemos diariamente.</p>

<h2>Conclusão</h2>

<p>A maior lição apresentada em <em>A morte é um dia que vale a pena viver</em> não está relacionada ao fim da vida, mas à maneira como escolhemos viver enquanto estamos aqui. A consciência da finitude não precisa gerar desesperança. Pelo contrário, pode funcionar como um lembrete poderoso de que cada dia possui valor.</p>

<p>Se soubéssemos exatamente quanto tempo nos resta, provavelmente mudaríamos muitas prioridades. A boa notícia é que não precisamos esperar uma grande perda ou uma notícia difícil para começar essa transformação. Podemos iniciar hoje.</p>

<p>Viver plenamente talvez não signifique fazer mais coisas, mas fazer escolhas mais conscientes. Afinal, a vida não se mede apenas pelos anos acumulados, mas pela presença, pelos vínculos construídos e pelo significado que damos ao tempo que recebemos.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);

/* ==========================================
   CONFIGURA SEO E INSERE CONTEÚDO DO ARTIGO
   ========================================== */
document.addEventListener("DOMContentLoaded", () => {
  // SEO
  document.title = ARTICLE.title + " | William Brioli";
  document.getElementById("metaTitle").textContent = ARTICLE.title;
  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
</script>

<!-- ==========================================
     SCRIPT QUE INJETA TEXTOS DOS BOTÕES DO SITE_DATA
     ========================================== -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  // Botão final do artigo
  const btn = document.getElementById("btnAgendarAtendimento");
  if (btn && window.SITE_DATA?.buttons?.articleCTA) {
    btn.textContent = window.SITE_DATA.buttons.articleCTA;
  }

  // Botão do modal de WhatsApp
  const modalWA = document.getElementById("postModalWhatsApp");
  if (modalWA && window.SITE_DATA?.buttons?.modalCTA) {
    modalWA.textContent = window.SITE_DATA.buttons.modalCTA;
  }

  // Botão inferior "Fechar"
  const modalCloseBtn = document.getElementById("postModalCloseBottom");
  if (modalCloseBtn && window.SITE_DATA?.buttons?.closeModal) {
    modalCloseBtn.textContent = window.SITE_DATA.buttons.closeModal;
  }
});
</script>
