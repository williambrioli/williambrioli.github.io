    content: `




<p>Imagine duas pessoas observando a mesma paisagem através de janelas diferentes. A primeira vê o mundo real, mas interpreta seus acontecimentos a partir de conflitos emocionais, desejos inconscientes e formas particulares de lidar com o sofrimento. A segunda, por outro lado, passa a enxergar uma realidade profundamente alterada, onde aquilo que percebe já não corresponde ao mundo compartilhado pelas demais pessoas. Essa metáfora ajuda a compreender uma dúvida muito comum: afinal, qual é a diferença entre histeria e psicose?</p>

<p>Apesar de frequentemente aparecerem juntas em filmes, redes sociais e até em conversas do cotidiano, histeria e psicose representam conceitos completamente diferentes dentro da saúde mental. Além disso, a própria palavra "histeria" sofreu importantes transformações ao longo da história da Psicologia e da Psiquiatria, deixando de ser utilizada como diagnóstico oficial nos manuais atuais, mas permanecendo extremamente relevante na psicanálise e na compreensão do funcionamento psíquico.</p>

<p>Compreender essas diferenças não serve apenas para ampliar conhecimentos. Também ajuda a reduzir preconceitos, evitar interpretações equivocadas sobre transtornos mentais e compreender por que pessoas diferentes podem sofrer de maneiras completamente distintas diante de conflitos emocionais.</p>

<h2>Explicação científica simplificada</h2>

<p>A psicose não é um transtorno específico, mas um conjunto de sintomas que envolve perda significativa do contato com a realidade. Entre suas manifestações mais conhecidas estão delírios, alucinações, pensamento desorganizado e alterações importantes na percepção da realidade.</p>

<p>Esses sintomas podem ocorrer em diferentes condições clínicas, como esquizofrenia, transtorno esquizoafetivo, episódios graves do transtorno bipolar, depressão com características psicóticas, algumas doenças neurológicas e até pelo uso de determinadas substâncias.</p>

<p>Já a histeria possui uma história muito diferente.</p>

<p>Historicamente, foi um dos primeiros grandes objetos de estudo de Sigmund Freud e teve papel fundamental no nascimento da psicanálise. Atualmente, o termo "histeria" praticamente não aparece como diagnóstico nos sistemas classificatórios modernos, como o DSM-5-TR e a CID-11. Muitas manifestações anteriormente chamadas de histeria passaram a ser compreendidas em categorias diagnósticas diferentes, como transtorno conversivo (Transtorno de Sintomas Neurológicos Funcionais), transtornos dissociativos e outros quadros relacionados.</p>

<p>Na psicanálise, entretanto, histeria continua sendo compreendida como uma estrutura clínica ou forma de organização subjetiva, marcada principalmente por conflitos inconscientes relacionados ao desejo, à identidade e ao reconhecimento pelo outro.</p>

<h2>O que caracteriza a histeria na psicanálise?</h2>

<p>Na perspectiva psicanalítica, a histeria não significa exagero, teatralidade ou "drama", como frequentemente aparece na linguagem popular. Essa associação é um estereótipo sem base científica.</p>

<p>A estrutura histérica caracteriza-se por intenso conflito psíquico, no qual o sofrimento frequentemente encontra formas indiretas de expressão.</p>

<p>Entre algumas características frequentemente descritas encontram-se:</p>

<ul>
<li>Conflitos emocionais inconscientes.</li>
<li>Busca constante por reconhecimento e validação.</li>
<li>Dificuldade em compreender o próprio desejo.</li>
<li>Sintomas físicos sem explicação neurológica em alguns casos (conversão).</li>
<li>Grande investimento nas relações interpessoais.</li>
<li>Oscilações emocionais relacionadas aos vínculos afetivos.</li>
</ul>

<p>É importante destacar que esses aspectos não constituem critérios diagnósticos do DSM-5, mas fazem parte da tradição teórica da psicanálise.</p>

<h2>O que caracteriza a psicose?</h2>

<p>Na psicose, a principal característica é a alteração significativa do contato com a realidade compartilhada.</p>

<p>Pessoas em episódio psicótico podem apresentar:</p>

<ul>
<li>Delírios (crenças fixas incompatíveis com as evidências).</li>
<li>Alucinações, especialmente auditivas.</li>
<li>Pensamento bastante desorganizado.</li>
<li>Comportamentos desorganizados.</li>
<li>Dificuldade importante em distinguir acontecimentos internos da realidade externa.</li>
</ul>

<p>Na psicanálise, a psicose também recebe uma compreensão estrutural própria, distinta da neurose e da perversão. Entretanto, independentemente da abordagem teórica utilizada, permanece o entendimento de que existe comprometimento importante da relação com a realidade.</p>

<h2>A principal diferença entre histeria e psicose</h2>

<p>A diferença central está justamente na relação estabelecida com a realidade.</p>

<p>Na histeria, mesmo existindo intenso sofrimento psicológico, conflitos inconscientes e sintomas emocionais ou físicos, a pessoa mantém preservado o teste de realidade. Ela consegue distinguir aquilo que pertence ao mundo externo daquilo que faz parte de sua experiência subjetiva.</p>

<p>Na psicose, por outro lado, essa capacidade encontra-se significativamente comprometida durante os episódios psicóticos. Delírios e alucinações passam a ser vivenciados como experiências reais.</p>

<p>Em outras palavras, na histeria existe sofrimento diante da realidade; na psicose, a própria percepção da realidade pode sofrer alterações importantes.</p>

<h2>Como essas condições aparecem na vida cotidiana?</h2>

<p>Na prática clínica, uma pessoa com funcionamento histérico pode desenvolver sintomas físicos relacionados ao sofrimento emocional, apresentar conflitos intensos nos relacionamentos, sentir necessidade constante de reconhecimento ou experimentar ansiedade importante diante de determinadas situações.</p>

<p>Apesar disso, ela reconhece que vive em uma realidade compartilhada com outras pessoas.</p>

<p>Já uma pessoa em episódio psicótico pode acreditar estar sendo perseguida sem evidências, ouvir vozes inexistentes para os demais ou interpretar acontecimentos cotidianos de forma profundamente diferente da realidade observável.</p>

<p>Essas experiências costumam gerar sofrimento intenso tanto para a pessoa quanto para seus familiares.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Uma das maiores dificuldades encontradas atualmente é o uso inadequado desses termos nas redes sociais. Expressões como "ele é psicótico", "ela é histérica" ou "isso é pura histeria" são frequentemente utilizadas como ofensas, sem qualquer relação com seus significados clínicos.</p>

<p>Esse tipo de uso contribui para aumentar o estigma relacionado aos transtornos mentais e dificulta que pessoas procurem ajuda especializada.</p>

<p>Na prática profissional, compreender a diferença entre histeria e psicose permite realizar avaliações muito mais precisas, respeitando a singularidade de cada indivíduo e evitando diagnósticos precipitados.</p>

<p>Também é importante lembrar que a histeria, conforme compreendida pela psicanálise, não corresponde a um diagnóstico do DSM-5-TR, enquanto a psicose representa um conjunto de sintomas presentes em diferentes transtornos mentais.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Evite utilizar "histérico" ou "psicótico" como adjetivos para descrever comportamentos cotidianos.</li>
<li>Lembre-se de que sofrimento emocional não significa perda do contato com a realidade.</li>
<li>Nem toda alteração emocional intensa representa psicose.</li>
<li>Sintomas psicóticos exigem avaliação especializada o mais rapidamente possível.</li>
<li>A história de vida, o contexto e a avaliação clínica são indispensáveis para compreender qualquer sofrimento psicológico.</li>
<li>Autodiagnósticos baseados apenas em conteúdos da internet devem ser evitados.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia oferece um espaço seguro para compreender a maneira como cada pessoa organiza sua experiência emocional, seus conflitos e sua forma de se relacionar consigo mesma e com o mundo.</p>

<p>Na clínica psicanalítica, compreender a estrutura subjetiva auxilia na construção de intervenções individualizadas. Em outras abordagens psicoterapêuticas, o foco pode envolver manejo dos sintomas, fortalecimento de recursos emocionais, desenvolvimento de estratégias de enfrentamento e melhora da qualidade de vida.</p>

<p>Quando há sintomas psicóticos, o acompanhamento costuma envolver atuação integrada entre psicoterapia, avaliação psiquiátrica e, quando indicado, tratamento medicamentoso.</p>

<h2>Conclusão</h2>

<p>Embora frequentemente confundidas, histeria e psicose representam conceitos bastante diferentes. A histeria, na tradição psicanalítica, refere-se a uma forma de organização subjetiva marcada por conflitos inconscientes e preservação do contato com a realidade. Já a psicose caracteriza-se pela presença de alterações importantes na percepção e na interpretação da realidade, podendo ocorrer em diferentes transtornos mentais.</p>

<p>Conhecer essas diferenças permite compreender melhor o sofrimento psíquico, combater estigmas e favorecer uma busca mais consciente por tratamento quando necessário. Assim como duas pessoas podem olhar pela mesma janela e enxergar experiências completamente distintas, compreender a saúde mental exige reconhecer que diferentes formas de sofrimento possuem origens, características e necessidades terapêuticas próprias.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
