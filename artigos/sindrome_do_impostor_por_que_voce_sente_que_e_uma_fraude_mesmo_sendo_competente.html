    content: `



<p>Algumas pessoas recebem elogios pelo trabalho que realizam, alcançam bons resultados e conquistam espaço na carreira, mas, mesmo assim, convivem com um pensamento persistente: "A qualquer momento vão descobrir que eu não sou tão competente quanto imaginam". Esse medo pode fazer com que cada conquista seja acompanhada de insegurança, culpa e uma necessidade constante de provar o próprio valor.</p>

<p>Foi o caso de uma paciente (caso fictício inspirado em situações clínicas frequentes, com características preservadas para garantir anonimato). Mesmo sendo reconhecida pela equipe e pelos gestores, ela revisava cada tarefa inúmeras vezes antes de entregá-la. Evitava assumir novos desafios por medo de falhar e acreditava que seu sucesso era fruto apenas de sorte. Quanto mais crescia profissionalmente, maior era o medo de ser "desmascarada".</p>

<p>Essa experiência é mais comum do que parece e está relacionada a um fenômeno psicológico conhecido como síndrome do impostor, frequentemente acompanhado por processos de autossabotagem profissional. Embora não seja considerado um transtorno mental pelos principais manuais diagnósticos, esse padrão pode gerar intenso sofrimento emocional e limitar o desenvolvimento pessoal e profissional.</p>

<h2>Explicação científica simplificada</h2>

<p>A chamada síndrome do impostor foi descrita em 1978 pelas psicólogas Pauline Clance e Suzanne Imes. Ela se caracteriza pela dificuldade em reconhecer as próprias competências e pela crença persistente de que as conquistas ocorreram por acaso, sorte ou fatores externos, e não pelo próprio esforço ou capacidade.</p>

<p>Pessoas que apresentam esse padrão costumam interpretar pequenos erros como provas de incompetência, enquanto minimizam sucessos e elogios. Esse modo de pensar favorece o surgimento da autossabotagem, que consiste em comportamentos que dificultam ou impedem o próprio crescimento.</p>

<p>Do ponto de vista da psicologia cognitiva, isso acontece porque crenças negativas profundamente enraizadas influenciam a interpretação da realidade. Mesmo diante de evidências objetivas de competência, o cérebro continua confirmando antigas convicções como "não sou bom o suficiente", "vou decepcionar as pessoas" ou "não mereço estar aqui".</p>

<p>A neurociência também demonstra que o cérebro tende a priorizar informações compatíveis com crenças já estabelecidas. Esse mecanismo, conhecido como viés de confirmação, faz com que críticas sejam valorizadas muito mais do que elogios, reforçando o ciclo de insegurança.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, percebe-se que a autossabotagem raramente surge por falta de capacidade. Na maioria das vezes, ela está ligada à história emocional da pessoa.</p>

<p>Muitos pacientes cresceram em ambientes marcados por críticas excessivas, comparação constante, perfeccionismo ou validação condicionada ao desempenho. Nesses contextos, aprenderam que errar significava perder amor, reconhecimento ou aceitação.</p>

<p>Na vida adulta, essas experiências podem permanecer ativas de maneira inconsciente. Mesmo quando a realidade demonstra competência, o mundo interno continua funcionando como se fosse necessário provar valor o tempo inteiro.</p>

<p>Isso explica comportamentos como procrastinar projetos importantes, evitar promoções, trabalhar muito além do necessário, sentir culpa ao descansar, não cobrar um valor justo pelos próprios serviços ou desistir de oportunidades antes mesmo de tentar.</p>

<p>É importante destacar que esse padrão não significa preguiça nem falta de força de vontade. Trata-se de um mecanismo psicológico de proteção. Paradoxalmente, evitar desafios parece mais seguro do que correr o risco de confirmar um medo antigo de não ser suficiente.</p>

<p>Como uma árvore que cresceu inclinada por causa do vento, a pessoa aprende uma forma específica de sobreviver. Com cuidado e apoio adequado, é possível fortalecer suas raízes e permitir um crescimento mais equilibrado, sem precisar carregar o peso constante da dúvida sobre o próprio valor.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Reconheça suas conquistas registrando resultados concretos, projetos concluídos e feedbacks positivos recebidos.</li>

<li>Observe quando pensamentos como "foi apenas sorte" aparecem e questione quais evidências realmente sustentam essa conclusão.</li>

<li>Aceite que competência não significa perfeição. Todo profissional experiente continua aprendendo ao longo da carreira.</li>

<li>Evite comparar seus bastidores com a vitrine das outras pessoas, especialmente nas redes sociais.</li>

<li>Permita-se celebrar pequenas conquistas sem imediatamente estabelecer uma nova meta.</li>

<li>Compartilhe dúvidas com pessoas de confiança. Muitas descobrem que colegas igualmente competentes vivenciam inseguranças semelhantes.</li>

<li>Pratique a autocompaixão, tratando-se com a mesma compreensão que ofereceria a um amigo diante de um erro.</li>

<li>Lembre-se de que sentir insegurança em novos desafios não significa incapacidade; frequentemente é um sinal de crescimento.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia oferece um espaço protegido para compreender a origem dessas crenças de inadequação e trabalhar sua transformação de forma consistente. O objetivo não é simplesmente aumentar a autoestima por meio de frases motivacionais, mas investigar como determinados padrões emocionais foram construídos ao longo da vida.</p>

<p>Durante o processo terapêutico, torna-se possível identificar experiências que fortaleceram sentimentos de insuficiência, desenvolver novas formas de interpretar o próprio desempenho e reduzir a necessidade constante de validação externa.</p>

<p>A terapia também auxilia na construção de uma identidade profissional mais saudável, baseada em competências reais, aceitação das próprias limitações e reconhecimento de que errar faz parte do desenvolvimento humano.</p>

<p>Com o tempo, muitas pessoas percebem que deixam de trabalhar movidas pelo medo de serem descobertas e passam a atuar com mais autenticidade, confiança e equilíbrio emocional.</p>

<h2>Conclusão</h2>

<p>Sentir que, a qualquer momento, alguém descobrirá que você é uma fraude pode ser extremamente desgastante. No entanto, esse sentimento não define quem você é nem representa necessariamente a realidade.</p>

<p>Assim como um espelho antigo pode distorcer a imagem refletida, experiências emocionais do passado também podem distorcer a maneira como enxergamos nossas próprias capacidades. A boa notícia é que essas lentes podem ser revistas e transformadas.</p>

<p>Ao compreender a origem da autossabotagem e desenvolver uma relação mais saudável consigo mesmo, torna-se possível reconhecer conquistas com mais serenidade, enfrentar desafios com menos medo e construir uma trajetória profissional baseada em competência real, e não na constante tentativa de provar seu valor.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

});

/* ==========================================
   CONFIGURA SEO E INSERE CONTEÚDO DO ARTIGO
   ========================================== */
document.addEventListener("DOMContentLoaded", () => {
  // SEO
  document.title = ARTICLE.title + " | William Brioli";
  document.getElementById("metaTitle").textContent = ARTICLE.title;
  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
</script>
