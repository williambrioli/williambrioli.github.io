    content: `



<p>Durante uma reunião, todos pareciam participar com naturalidade. Ideias eram compartilhadas, perguntas eram feitas e opiniões surgiam espontaneamente. Em um dos cantos da sala, porém, alguém permanecia em silêncio. Não porque não tivesse conhecimento ou boas contribuições, mas porque uma única pergunta ocupava toda a sua atenção: "E se eu falar alguma coisa e todos me julgarem?"</p>

<p>Ao final da reunião, veio o arrependimento. A ideia que permaneceu guardada acabou sendo apresentada por outra pessoa e foi muito bem recebida. Mais uma vez, o medo falou mais alto do que o próprio potencial.</p>

<p>Essa realidade faz parte da vida de muitas pessoas que convivem com a ansiedade social. O receio intenso de ser observado, criticado, rejeitado ou avaliado negativamente pode limitar relacionamentos, oportunidades profissionais, desempenho acadêmico e até atividades simples do cotidiano. Embora muitos interpretem esse comportamento como timidez, existe uma diferença importante entre ser naturalmente reservado e viver aprisionado pelo medo constante do julgamento.</p>

<h2>Explicação científica simplificada</h2>

<p>O Transtorno de Ansiedade Social, também conhecido como fobia social, é caracterizado por um medo intenso e persistente de situações nas quais a pessoa acredita que poderá ser observada, avaliada ou julgada pelos outros.</p>

<p>Esse medo não surge apenas diante de grandes apresentações. Ele pode aparecer em situações comuns, como conversar com desconhecidos, participar de reuniões, responder perguntas em sala de aula, fazer refeições em público, utilizar banheiros públicos, iniciar conversas ou até realizar uma ligação telefônica.</p>

<p>Do ponto de vista biológico, o cérebro interpreta essas situações sociais como se representassem uma ameaça real. O sistema nervoso ativa a resposta de luta ou fuga, provocando sintomas físicos semelhantes aos observados em outros transtornos de ansiedade.</p>

<ul>
<li>Aceleração dos batimentos cardíacos.</li>
<li>Sudorese.</li>
<li>Tremores.</li>
<li>Vermelhidão no rosto.</li>
<li>Tensão muscular.</li>
<li>Falta de ar.</li>
<li>Sensação de "branco" na mente.</li>
<li>Dificuldade para organizar pensamentos.</li>
</ul>

<p>Esses sintomas acabam reforçando o medo. A pessoa acredita que todos estão percebendo seu nervosismo e interpretando aquilo de forma negativa, quando, na realidade, a maioria das pessoas sequer nota essas alterações.</p>

<p>Uma metáfora ajuda a compreender esse funcionamento.</p>

<p>Imagine caminhar por um palco iluminado por um enorme refletor. A sensação é de que todos estão olhando exclusivamente para você. No entanto, na vida real, cada pessoa está ocupada principalmente com suas próprias preocupações, inseguranças e desafios.</p>

<p>A ansiedade social cria a ilusão de que existe um holofote permanente apontado para quem sofre com ela. Esse fenômeno é conhecido na psicologia como "efeito holofote", uma tendência de superestimar o quanto somos observados pelos outros.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, muitas pessoas relatam que o maior sofrimento não acontece durante a situação social, mas muito antes e muito depois dela.</p>

<p>Dias antes de um encontro importante, a mente começa a antecipar possíveis erros, críticas e situações constrangedoras. Após o evento, mesmo quando tudo ocorreu bem, inicia-se uma longa revisão mental de cada palavra dita, de cada expressão facial e de cada detalhe da interação.</p>

<p>Esse processo produz um desgaste emocional significativo.</p>

<p>Ao longo do tempo, muitas pessoas passam a evitar situações sociais para diminuir a ansiedade. Recusam convites, deixam de participar de cursos, evitam entrevistas de emprego, recusam promoções ou permanecem em silêncio em ambientes profissionais.</p>

<p>Embora a evitação produza alívio imediato, ela fortalece o problema. O cérebro interpreta que a fuga foi responsável por impedir uma experiência negativa e passa a aumentar ainda mais a ansiedade diante de situações semelhantes.</p>

<p>Outro aspecto importante é que pessoas com ansiedade social costumam apresentar um padrão elevado de autocrítica. Pequenos equívocos são interpretados como fracassos enormes, enquanto acertos costumam ser minimizados ou atribuídos à sorte.</p>

<p>Isso faz com que competências reais permaneçam escondidas, limitando o desenvolvimento pessoal, acadêmico e profissional.</p>

<p>É importante destacar que ansiedade social não significa falta de inteligência, ausência de habilidades ou desinteresse pelas pessoas. Muitas vezes, representa justamente o contrário: um desejo intenso de ser aceito combinado com um medo exagerado da rejeição.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Embora o tratamento seja individualizado, algumas estratégias podem ajudar a reduzir o impacto da ansiedade social no cotidiano.</p>

<ul>
<li>Observe quais pensamentos surgem antes de situações sociais importantes.</li>
<li>Pergunte-se quais evidências reais sustentam a ideia de que todos irão julgá-lo negativamente.</li>
<li>Lembre-se de que sentir ansiedade não significa que algo dará errado.</li>
<li>Evite abandonar situações apenas porque ficou ansioso. Permanecer nelas permite que o cérebro aprenda que o perigo imaginado não se confirma.</li>
<li>Pratique pequenas exposições graduais, iniciando por situações que provoquem desconforto leve e aumentando progressivamente o desafio.</li>
<li>Desenvolva autocompaixão. Todos cometem erros durante interações sociais, e isso faz parte da experiência humana.</li>
</ul>

<p>Um exercício simples pode ajudar.</p>

<p>Antes de uma situação social, escreva em uma folha três previsões negativas que sua mente está fazendo.</p>

<p>Depois do evento, volte à lista e responda:</p>

<ul>
<li>O que realmente aconteceu?</li>
<li>Minha previsão se confirmou totalmente, parcialmente ou não aconteceu?</li>
<li>Como avaliaria essa situação se outra pessoa tivesse vivido exatamente a mesma experiência?</li>
</ul>

<p>Com o tempo, esse exercício ajuda o cérebro a diferenciar previsões imaginadas dos acontecimentos reais.</p>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia é considerada um dos tratamentos mais eficazes para o transtorno de ansiedade social. Durante o processo terapêutico, a pessoa aprende a compreender como pensamentos automáticos, crenças pessoais, emoções e comportamentos de evitação se relacionam.</p>

<p>Também é possível desenvolver estratégias para enfrentar gradualmente situações temidas, reduzir a autocrítica excessiva e fortalecer uma percepção mais equilibrada sobre si mesmo.</p>

<p>Em muitos casos, o trabalho terapêutico investiga experiências anteriores de rejeição, críticas intensas, bullying ou ambientes excessivamente exigentes que podem ter contribuído para o desenvolvimento desse padrão emocional.</p>

<p>Quando necessário, a psicoterapia pode ser associada à avaliação psiquiátrica para verificar a indicação de tratamento medicamentoso. Essa decisão deve ser individualizada e baseada em avaliação clínica.</p>

<p>O mais importante é compreender que ansiedade social possui tratamento. Muitas pessoas conseguem voltar a participar de reuniões, fazer apresentações, criar novos relacionamentos e desenvolver seu potencial após receberem acompanhamento adequado.</p>

<h2>Conclusão</h2>

<p>O medo de ser julgado pode transformar oportunidades em silêncio, talentos em insegurança e sonhos em adiamentos constantes.</p>

<p>Entretanto, o julgamento mais duro costuma acontecer dentro da própria mente. Enquanto a ansiedade faz acreditar que todos estão observando cada detalhe, a realidade mostra que as pessoas normalmente estão muito mais preocupadas consigo mesmas.</p>

<p>Aprender a enfrentar esse medo não significa eliminar completamente a ansiedade, mas impedir que ela continue decidindo os rumos da vida.</p>

<p>A psicoterapia oferece um espaço seguro para compreender essas experiências, fortalecer a autoestima e construir uma relação mais saudável com as próprias emoções. Quando o medo deixa de comandar as escolhas, o potencial que antes permanecia escondido pode finalmente encontrar espaço para se desenvolver.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

/* ==========================================
   CONFIGURA SEO E INSERE CONTEÚDO DO ARTIGO
   ========================================== */

  document.title = ARTICLE.title + " | William Brioli";

  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
</script>
