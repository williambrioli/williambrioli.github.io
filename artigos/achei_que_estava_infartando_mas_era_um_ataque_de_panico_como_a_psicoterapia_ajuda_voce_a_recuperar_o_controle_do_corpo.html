<p>Era uma manhã comum. A pessoa estava trabalhando quando, de repente, sentiu o coração acelerar intensamente. O peito parecia apertado, a respiração ficou curta, as mãos começaram a suar e uma tontura tomou conta do corpo. Em poucos segundos, surgiu um pensamento desesperador: "Estou infartando."</p>

<p>A caminho do pronto-socorro, a sensação parecia confirmar esse medo. O coração batia cada vez mais forte, o corpo tremia, a boca secava e uma intensa sensação de morte iminente dominava a mente. Depois de todos os exames, porém, veio uma notícia inesperada: o coração estava saudável. O diagnóstico foi outro: ataque de pânico.</p>

<p>Essa experiência é mais comum do que muitas pessoas imaginam. Por produzir sintomas físicos extremamente intensos, o ataque de pânico frequentemente é confundido com um infarto ou outra emergência médica. Embora seja uma condição que merece atenção e tratamento, compreender o que realmente acontece no organismo é o primeiro passo para recuperar a sensação de segurança e retomar o controle da própria vida.</p>

<h2>Explicação científica simplificada</h2>

<p>O ataque de pânico é um episódio súbito de medo intenso acompanhado por uma forte ativação do sistema nervoso autônomo. Durante esse episódio, o cérebro interpreta, de forma equivocada, que existe uma ameaça extrema, mesmo quando não há perigo real.</p>

<p>Essa interpretação ativa o mecanismo conhecido como resposta de luta ou fuga. Trata-se de um sistema biológico desenvolvido ao longo da evolução humana para aumentar as chances de sobrevivência diante de situações realmente perigosas.</p>

<p>Nesse processo, ocorre uma liberação de adrenalina e outras substâncias que preparam o organismo para agir rapidamente. Como consequência, surgem diversos sintomas físicos:</p>

<ul>
<li>Aceleração dos batimentos cardíacos.</li>
<li>Sensação de falta de ar.</li>
<li>Respiração rápida e superficial.</li>
<li>Tremores.</li>
<li>Suor intenso.</li>
<li>Tontura.</li>
<li>Formigamentos.</li>
<li>Sensação de desmaio.</li>
<li>Aperto ou dor no peito.</li>
<li>Sensação de perda de controle ou medo de morrer.</li>
</ul>

<p>Embora esses sintomas sejam extremamente desconfortáveis, eles não significam, na maioria dos casos, que exista uma doença cardíaca. O organismo está funcionando exatamente como faria diante de um perigo real, mas o alarme foi acionado sem necessidade.</p>

<p>Uma metáfora ajuda a entender esse processo.</p>

<p>Imagine que o sistema de alarme de uma casa esteja desregulado. Em vez de tocar apenas quando um invasor entra, ele dispara quando passa um gato no quintal, quando venta forte ou quando uma folha encosta na janela.</p>

<p>O problema não está na existência do alarme. O problema está na sensibilidade exagerada do sistema.</p>

<p>No ataque de pânico, algo semelhante acontece com o cérebro. Ele identifica uma ameaça onde ela não existe e mobiliza todo o organismo para enfrentar um perigo imaginário.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, uma das maiores dificuldades enfrentadas por quem sofre ataques de pânico não é apenas o episódio em si, mas o medo de que ele aconteça novamente.</p>

<p>Após viver uma crise intensa, muitas pessoas passam a monitorar constantemente o próprio corpo. Qualquer alteração na respiração, qualquer batimento cardíaco mais acelerado ou qualquer sensação diferente passa a ser interpretada como o início de uma nova crise.</p>

<p>Esse estado permanente de vigilância produz um ciclo bastante conhecido.</p>

<ul>
<li>A pessoa percebe uma sensação corporal.</li>
<li>Interpreta essa sensação como um perigo.</li>
<li>A ansiedade aumenta.</li>
<li>O organismo libera mais adrenalina.</li>
<li>Os sintomas físicos ficam ainda mais intensos.</li>
<li>Isso reforça a crença de que algo grave está acontecendo.</li>
</ul>

<p>Esse ciclo pode fazer com que a pessoa evite dirigir, frequentar supermercados, viajar, utilizar elevadores, participar de reuniões ou permanecer em locais onde acredita que será difícil receber ajuda.</p>

<p>Com o passar do tempo, a vida começa a ser organizada em função do medo.</p>

<p>É importante compreender que evitar situações pode trazer um alívio momentâneo, mas costuma fortalecer o problema a longo prazo. O cérebro aprende, equivocadamente, que aquele ambiente realmente era perigoso, aumentando ainda mais a ansiedade nas próximas ocasiões.</p>

<p>Outro aspecto importante é que o ataque de pânico não representa fraqueza emocional. Trata-se de uma resposta fisiológica intensa associada ao funcionamento do sistema nervoso e aos processos cognitivos relacionados à interpretação das sensações corporais.</p>

<p>Por isso, buscar ajuda não significa incapacidade. Significa interromper um ciclo que, sozinho, tende a se manter.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Embora o tratamento deva ser individualizado, algumas estratégias podem contribuir para reduzir o impacto das crises e favorecer uma sensação maior de segurança.</p>

<ul>
<li>Procure avaliação médica sempre que os sintomas forem novos ou houver dúvida sobre sua origem, especialmente em casos de dor torácica intensa ou fatores de risco cardiovasculares.</li>
<li>Depois da exclusão de causas clínicas importantes, evite realizar exames repetidamente apenas para reduzir a ansiedade momentânea.</li>
<li>Lembre-se de que sintomas intensos não significam necessariamente um perigo real.</li>
<li>Observe seus pensamentos durante a crise. Muitas vezes, a interpretação catastrófica aumenta a intensidade dos sintomas.</li>
<li>Mantenha uma rotina regular de sono, alimentação e atividade física, fatores que contribuem para o equilíbrio do sistema nervoso.</li>
<li>Reduza o consumo excessivo de cafeína e outras substâncias estimulantes quando houver orientação profissional.</li>
</ul>

<p>Um exercício simples pode ajudar durante os primeiros sinais de ansiedade.</p>

<p>Imagine que você está observando nuvens passando pelo céu. Algumas são pequenas, outras grandes e escuras. Nenhuma delas permanece para sempre.</p>

<p>Faça uma respiração lenta, inspirando pelo nariz por cerca de quatro segundos e expirando suavemente por seis segundos. Enquanto respira, diga mentalmente:</p>

<ul>
<li>"Meu corpo está ativado."</li>
<li>"Essa sensação é desconfortável, mas tende a passar."</li>
<li>"Posso permitir que ela diminua sem lutar contra ela."</li>
</ul>

<p>Esse exercício não elimina instantaneamente a ansiedade, mas ajuda a reduzir a escalada provocada pelo medo dos próprios sintomas.</p>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia é uma das principais formas de tratamento para o transtorno do pânico e para ataques de pânico recorrentes. O processo terapêutico auxilia a compreender como pensamentos, emoções, experiências de vida e respostas fisiológicas se relacionam.</p>

<p>Ao longo das sessões, a pessoa aprende a reconhecer interpretações automáticas, reduzir o medo das sensações corporais e desenvolver estratégias mais saudáveis de enfrentamento.</p>

<p>Dependendo das necessidades individuais, o trabalho terapêutico também pode abordar situações de estresse prolongado, conflitos emocionais, perdas, traumas, perfeccionismo e outros fatores que contribuem para a manutenção da ansiedade.</p>

<p>Em alguns casos, a avaliação psiquiátrica pode ser indicada para verificar a necessidade de tratamento medicamentoso associado à psicoterapia. Essa decisão deve sempre ser individualizada e baseada em avaliação profissional.</p>

<p>O aspecto mais importante é compreender que recuperar a sensação de segurança é possível. Com tratamento adequado, muitas pessoas voltam a dirigir, viajar, trabalhar, estudar e viver com autonomia, mesmo após anos limitadas pelo medo.</p>

<h2>Conclusão</h2>

<p>Sentir um ataque de pânico pode ser uma das experiências mais assustadoras que alguém enfrenta. A intensidade dos sintomas faz parecer que algo extremamente grave está acontecendo, mesmo quando o organismo não está em risco iminente.</p>

<p>Entretanto, compreender como esse mecanismo funciona muda profundamente a relação com a ansiedade. Quando a pessoa deixa de interpretar cada sintoma como uma ameaça mortal, o ciclo do medo começa a perder força.</p>

<p>A terapia não elimina apenas as crises. Ela ajuda a reconstruir a confiança no próprio corpo, reduz o medo constante e permite que a vida deixe de ser guiada pela antecipação do perigo.</p>

<p>Recuperar o controle não significa nunca mais sentir ansiedade. Significa aprender que o corpo pode disparar falsos alarmes e que é possível responder a eles com conhecimento, equilíbrio e apoio profissional.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
