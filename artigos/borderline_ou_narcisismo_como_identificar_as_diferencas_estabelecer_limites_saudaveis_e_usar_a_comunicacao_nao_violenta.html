<p>Cláudia (nome fictício) passou anos acreditando que o problema era ela. Sempre que tentava conversar sobre algo que a machucava, a conversa terminava em acusações, culpa, pedidos desesperados de perdão ou promessas de mudança que pareciam sinceras, mas duravam pouco. Em alguns dias, era tratada como a pessoa mais importante do mundo; em outros, como alguém que merecia ser afastado. Aos poucos, ela deixou de confiar nas próprias percepções. Antes de tomar qualquer decisão, perguntava a si mesma: "Será que estou exagerando?"</p>

<p>Histórias semelhantes são frequentes na prática clínica. Viver um relacionamento marcado por intensa instabilidade emocional pode gerar confusão, medo, ansiedade e um desgaste psicológico profundo. Muitas pessoas passam anos tentando "salvar" quem amam, enquanto deixam de cuidar da própria saúde emocional. Em alguns casos, o parceiro ou familiar apresenta características compatíveis com o Transtorno da Personalidade Borderline (TPB). Em outros, predominam traços associados ao Transtorno da Personalidade Narcisista (TPN). Também existem situações em que comportamentos semelhantes aparecem sem que exista um diagnóstico formal.</p>

<p>Independentemente da existência de um transtorno, uma pergunta costuma surgir: como proteger a própria saúde emocional sem abandonar a empatia? A resposta não está em controlar o outro, mas em aprender a estabelecer limites saudáveis, comunicar necessidades com clareza e reconhecer que cuidar de si mesmo não significa deixar de amar alguém.</p>

<h2>Explicação científica simplificada</h2>

<p>O Transtorno da Personalidade Borderline é um transtorno de personalidade caracterizado por um padrão persistente de instabilidade nas emoções, nos relacionamentos interpessoais, na autoimagem e na capacidade de regular impulsos. Pessoas com TPB frequentemente vivenciam emoções muito intensas e rápidas, experimentam medo acentuado de abandono e podem interpretar pequenos acontecimentos como sinais de rejeição.</p>

<p>É importante compreender que o TPB não significa que a pessoa seja "má", "manipuladora" ou "sem sentimentos". Pelo contrário, muitas vezes ela experimenta sofrimento intenso e dificuldades reais para regular emoções que parecem assumir proporções muito maiores do que a situação objetiva justificaria. Isso não elimina a responsabilidade pelos próprios comportamentos, mas ajuda a compreender por que determinadas reações acontecem.</p>

<p>Já o Transtorno da Personalidade Narcisista possui características diferentes. Embora também possa envolver conflitos interpessoais, costuma apresentar padrões persistentes de grandiosidade, necessidade intensa de admiração e dificuldades importantes de empatia. Enquanto a pessoa com TPB frequentemente teme ser abandonada, a pessoa com TPN tende a organizar seus relacionamentos em torno da validação da própria autoestima e da preservação de uma autoimagem idealizada.</p>

<p>Na prática, entretanto, essa diferenciação nem sempre é simples. Algumas pessoas apresentam traços de ambos os transtornos, enquanto outras manifestam comportamentos semelhantes sem preencher critérios diagnósticos. Por isso, diagnósticos pertencem exclusivamente à avaliação realizada por profissionais qualificados e nunca devem ser baseados apenas em conteúdos encontrados na internet.</p>

<p>Uma metáfora útil é imaginar dois barcos enfrentando uma tempestade. No TPB, o barco é constantemente atingido por ondas emocionais extremamente intensas, dificultando manter estabilidade. No narcisismo, o barco pode parecer firme externamente, mas grande parte da energia está voltada para preservar sua aparência impecável diante dos outros. Em ambos os casos podem existir conflitos, porém as motivações psicológicas costumam ser diferentes.</p>

<h2>Borderline e narcisismo: diferenças fundamentais</h2>

<p>Embora muitas pessoas confundam esses dois transtornos, compreender suas diferenças ajuda familiares e parceiros a responderem de maneira mais consciente aos conflitos cotidianos.</p>

<ul>
<li>No TPB, o medo de abandono costuma ocupar papel central; no TPN, a necessidade de reconhecimento e superioridade tende a ser predominante.</li>
<li>No TPB, as emoções frequentemente mudam rapidamente; no TPN, a autoestima costuma oscilar conforme elogios, críticas e sensação de prestígio.</li>
<li>Pessoas com TPB frequentemente sentem culpa intensa após episódios de descontrole emocional; já no TPN, reconhecer erros pode representar uma ameaça importante à autoimagem.</li>
<li>Em ambos os casos podem ocorrer conflitos, impulsividade, rompimentos e dificuldades de relacionamento, mas as razões psicológicas normalmente são distintas.</li>
</ul>

<p>Essas diferenças não devem servir para rotular pessoas, e sim para favorecer uma compreensão mais cuidadosa da dinâmica relacional. O foco deste artigo não é identificar diagnósticos, mas oferecer recursos para que você preserve sua própria saúde emocional independentemente do comportamento do outro.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Um dos maiores equívocos observados em relacionamentos marcados por intensa instabilidade emocional é acreditar que amor, paciência ou dedicação ilimitada serão suficientes para transformar o comportamento da outra pessoa. Essa expectativa frequentemente leva familiares e parceiros a abandonar necessidades pessoais, flexibilizar valores importantes e assumir responsabilidades que pertencem exclusivamente ao outro.</p>

<p>Na psicoterapia, é comum encontrar pessoas emocionalmente exaustas porque passaram anos tentando evitar conflitos. Elas deixam de expressar opiniões, escondem sentimentos, aceitam comportamentos ofensivos e caminham constantemente "pisando em ovos". Aos poucos, deixam de viver segundo seus próprios valores para organizar toda a rotina em função das reações imprevisíveis do relacionamento.</p>

<p>Nesse contexto, estabelecer limites não significa punir, controlar ou rejeitar alguém. Significa reconhecer onde termina a responsabilidade pelo outro e onde começa a responsabilidade consigo mesmo. Esse será o ponto de partida para compreender como a Comunicação Não Violenta pode fortalecer relacionamentos mais seguros sem abrir mão do respeito mútuo.</p>


<h2>Comunicação Não Violenta: um caminho para estabelecer limites sem alimentar conflitos</h2>

<p>Muitas pessoas acreditam que estabelecer limites significa tornar-se frio, distante ou excessivamente rígido. Outras imaginam que comunicar necessidades inevitavelmente provocará discussões. Entretanto, a Comunicação Não Violenta (CNV), desenvolvida pelo psicólogo Marshall Rosenberg, propõe uma perspectiva diferente: é possível expressar firmeza sem agressividade e exercer empatia sem abrir mão da própria dignidade.</p>

<p>A CNV parte da compreensão de que grande parte dos conflitos humanos não surge apenas dos fatos, mas da forma como interpretamos e comunicamos esses fatos. Quando alguém se sente atacado, julgado ou humilhado, tende a responder de maneira defensiva. Em relacionamentos marcados por intensa instabilidade emocional, esse ciclo costuma tornar-se ainda mais intenso.</p>

<p>Isso não significa que a Comunicação Não Violenta seja uma técnica capaz de impedir todas as explosões emocionais. Ela não controla o comportamento da outra pessoa. O que ela faz é aumentar as chances de uma comunicação mais clara, reduzir interpretações desnecessárias e permitir que você mantenha coerência com seus próprios valores, mesmo quando o outro reage de forma intensa.</p>

<p>A CNV é construída sobre quatro componentes principais: observar os fatos sem julgamentos precipitados, reconhecer os próprios sentimentos, identificar as necessidades envolvidas e formular pedidos claros, específicos e possíveis de serem compreendidos. Esses elementos parecem simples, mas exigem prática, autoconhecimento e disposição para abandonar padrões automáticos de comunicação.</p>

<h2>O primeiro passo: separar fatos de interpretações</h2>

<p>Em momentos de conflito, nosso cérebro tende a preencher lacunas rapidamente. Em vez de descrever acontecimentos objetivos, passamos a interpretar intenções. Frases como "você nunca liga para mim", "você faz isso para me machucar" ou "você só pensa em si mesmo" misturam observações com conclusões pessoais.</p>

<p>Na prática clínica, observa-se que quanto mais emocionalmente ativada uma pessoa está, maior a probabilidade de interpretar comportamentos neutros como ameaças, rejeições ou ataques pessoais. Esse fenômeno pode ocorrer em qualquer indivíduo, mas costuma ser particularmente intenso em pessoas que apresentam dificuldades importantes na regulação emocional.</p>

<p>Uma comunicação baseada em observações concretas tende a reduzir esse efeito. Em vez de afirmar "você nunca me escuta", por exemplo, uma descrição objetiva poderia ser: "Durante nossa conversa de ontem, enquanto eu falava, você saiu da sala antes que eu terminasse."</p>

<p>A diferença parece pequena, mas é significativa. Enquanto a primeira frase descreve uma característica global da personalidade do outro, a segunda descreve um comportamento específico. Isso diminui a probabilidade de que a conversa seja desviada para uma disputa sobre quem está certo ou errado.</p>

<h2>Reconhecer sentimentos não é o mesmo que acusar</h2>

<p>Outro aspecto importante da Comunicação Não Violenta é diferenciar sentimentos de acusações disfarçadas.</p>

<p>Observe estas duas frases:</p>

<ul>
<li>"Sinto que você não me respeita."</li>
<li>"Sinto tristeza e frustração quando isso acontece."</li>
</ul>

<p>Na primeira frase, embora a pessoa utilize a expressão "sinto", ela continua fazendo uma avaliação sobre o comportamento do outro. Na segunda, ela descreve sua própria experiência emocional.</p>

<p>Essa mudança favorece o diálogo porque desloca a conversa da tentativa de provar quem está certo para a compreensão das necessidades emocionais envolvidas.</p>

<p>Reconhecer sentimentos exige ampliar o vocabulário emocional. Muitas pessoas conseguem identificar apenas emoções básicas, como raiva, tristeza ou felicidade. Entretanto, emoções humanas são muito mais complexas: frustração, impotência, insegurança, alívio, esperança, vergonha, culpa, solidão, gratidão e decepção representam apenas alguns exemplos.</p>

<p>Quanto maior a capacidade de nomear emoções, maior costuma ser a possibilidade de regulá-las de forma saudável.</p>

<h2>As necessidades humanas por trás dos conflitos</h2>

<p>Marshall Rosenberg propôs que conflitos frequentemente não surgem porque as necessidades são incompatíveis, mas porque as estratégias utilizadas para atendê-las entram em choque.</p>

<p>Imagine duas pessoas em um relacionamento. Uma deseja conversar durante horas após um desentendimento; a outra prefere permanecer em silêncio por algum tempo antes de retomar o assunto.</p>

<p>À primeira vista, parecem necessidades opostas. Entretanto, observando mais profundamente, talvez ambas estejam buscando exatamente a mesma coisa: segurança emocional.</p>

<p>A primeira procura segurança aproximando-se.</p>

<p>A segunda procura segurança afastando-se temporariamente para recuperar o equilíbrio.</p>

<p>Quando compreendemos as necessidades subjacentes, torna-se mais fácil negociar estratégias sem transformar diferenças em ataques pessoais.</p>

<p>Entre as necessidades humanas frequentemente presentes em relacionamentos estão:</p>

<ul>
<li>Segurança emocional.</li>
<li>Pertencimento.</li>
<li>Autonomia.</li>
<li>Respeito.</li>
<li>Reconhecimento.</li>
<li>Liberdade.</li>
<li>Previsibilidade.</li>
<li>Afeto.</li>
<li>Confiança.</li>
<li>Cooperação.</li>
</ul>

<p>Identificar necessidades não significa que todas devam ser atendidas exatamente como desejamos. Significa compreender o que realmente está sendo buscado por trás dos comportamentos.</p>

<h2>Limites saudáveis não são punições</h2>

<p>Um dos conceitos mais importantes para familiares e parceiros de pessoas emocionalmente instáveis é compreender a diferença entre limite e controle.</p>

<p>Controlar significa tentar determinar como o outro deve pensar, sentir ou agir.</p>

<p>Limitar significa definir aquilo que você fará para proteger sua integridade caso determinado comportamento aconteça.</p>

<p>Essa distinção modifica completamente a dinâmica do relacionamento.</p>

<p>Observe dois exemplos.</p>

<p><strong>Tentativa de controle:</strong></p>

<p>"Você está proibido de levantar a voz."</p>

<p><strong>Limite saudável:</strong></p>

<p>"Se nossa conversa continuar com gritos ou ofensas, vou encerrá-la e retomaremos quando ambos estivermos mais tranquilos."</p>

<p>No primeiro caso, a pessoa tenta controlar diretamente o comportamento do outro.</p>

<p>No segundo, comunica claramente qual será sua própria atitude diante daquela situação.</p>

<p>Essa diferença preserva a autonomia de ambos e reduz disputas de poder.</p>

<p>Limites saudáveis também precisam ser coerentes, proporcionais e consistentes. Um limite anunciado e nunca cumprido perde credibilidade rapidamente. Da mesma forma, consequências excessivamente severas para pequenas situações tendem a aumentar conflitos em vez de reduzi-los.</p>

<h2>Quando a empatia se transforma em autonegligência</h2>

<p>Pessoas que convivem com alguém emocionalmente instável frequentemente desenvolvem um padrão silencioso de autossacrifício. Com medo de desencadear crises, começam a abrir mão de atividades que apreciam, afastam-se de amigos, evitam expressar opiniões e passam a monitorar constantemente o humor da outra pessoa.</p>

<p>Com o passar do tempo, esse funcionamento produz uma inversão perigosa: toda a atenção fica direcionada às necessidades do outro, enquanto as próprias necessidades tornam-se invisíveis.</p>

<p>A empatia é uma habilidade fundamental em qualquer relacionamento saudável. Entretanto, quando ela deixa de coexistir com o autocuidado, transforma-se em um fator de vulnerabilidade.</p>

<p>Cuidar de si mesmo não representa egoísmo. Representa reconhecer que nenhum relacionamento consegue permanecer saudável quando apenas uma das pessoas sustenta continuamente o equilíbrio emocional da relação.</p>


<h2>O ciclo do conflito: por que as mesmas discussões parecem acontecer repetidamente?</h2>

<p>Uma das experiências mais desgastantes para quem convive com uma pessoa que apresenta intensa instabilidade emocional é a sensação de viver sempre a mesma discussão. O assunto muda, mas a dinâmica permanece semelhante: uma situação aparentemente pequena desencadeia uma reação intensa, seguida por tentativas de explicação, novos mal-entendidos, desgaste emocional e, muitas vezes, reconciliações que não resolvem o problema de forma duradoura.</p>

<p>Esse padrão pode ser compreendido como um ciclo relacional. Cada pessoa influencia a resposta da outra, mesmo sem perceber. Em muitos casos, quem convive com alguém emocionalmente instável desenvolve estratégias para evitar conflitos, como pedir desculpas rapidamente, ceder constantemente ou esconder sentimentos. Embora essas estratégias tragam alívio momentâneo, elas costumam manter o ciclo funcionando.</p>

<p>Do ponto de vista psicológico, comportamentos que reduzem imediatamente uma tensão tendem a ser repetidos. Assim, tanto quem reage de forma explosiva quanto quem evita o confronto pode acabar fortalecendo um padrão que, no longo prazo, produz sofrimento para ambos.</p>

<p>Reconhecer esse ciclo não significa procurar culpados. Significa compreender que mudanças consistentes normalmente começam quando uma das pessoas modifica sua forma de participar da dinâmica relacional.</p>

<h2>Como responder sem alimentar a escalada emocional</h2>

<p>Quando alguém está tomado por emoções muito intensas, tentar convencer essa pessoa utilizando apenas argumentos lógicos raramente produz o efeito esperado. Isso ocorre porque, durante estados de elevada ativação emocional, nossa capacidade de refletir de maneira equilibrada tende a diminuir.</p>

<p>Isso não significa concordar com acusações injustas ou aceitar comportamentos desrespeitosos. Significa escolher uma forma de responder que reduza a probabilidade de intensificar ainda mais o conflito.</p>

<p>Algumas atitudes costumam favorecer uma comunicação mais funcional:</p>

<ul>
<li>Falar em tom de voz calmo e constante.</li>
<li>Evitar responder imediatamente quando perceber que também está emocionalmente ativado.</li>
<li>Concentrar-se no assunto presente, evitando resgatar antigos conflitos para fortalecer um argumento.</li>
<li>Reconhecer a emoção do outro sem validar interpretações distorcidas dos fatos.</li>
<li>Repetir mensagens importantes de maneira clara, objetiva e respeitosa.</li>
</ul>

<p>Por exemplo, é possível dizer: "Percebo que você está muito magoado com essa situação. Quero conversar sobre isso, mas preciso que consigamos falar sem ofensas para que eu possa compreender melhor o que aconteceu."</p>

<p>Nessa resposta há acolhimento da emoção, mas também existe um limite claro em relação à forma como a conversa deverá acontecer.</p>

<h2>Validar emoções não significa concordar com comportamentos</h2>

<p>Esse é um dos conceitos mais importantes para familiares, parceiros e amigos. Muitas pessoas acreditam que validar uma emoção significa admitir que o outro está completamente certo. Na realidade, validação emocional é reconhecer que a experiência subjetiva daquela pessoa é real para ela, ainda que sua interpretação dos acontecimentos não corresponda aos fatos.</p>

<p>Considere um exemplo. Uma pessoa afirma: "Você demorou para responder minha mensagem porque não se importa comigo."</p>

<p>Responder "você está exagerando" ou "isso não faz sentido" tende a aumentar a defensividade.</p>

<p>Por outro lado, responder "consigo perceber que essa demora fez você se sentir inseguro" valida a emoção sem confirmar a conclusão de que houve desinteresse.</p>

<p>Essa diferença é fundamental. A validação reduz a sensação de invalidação emocional, mas preserva o compromisso com a realidade.</p>

<h2>Quando o limite precisa ser firme</h2>

<p>Embora a empatia seja uma ferramenta poderosa, existem situações nas quais a prioridade deixa de ser melhorar a comunicação e passa a ser proteger a integridade física ou psicológica.</p>

<p>Ameaças, agressões físicas, violência psicológica persistente, isolamento social imposto, controle financeiro, humilhações constantes ou qualquer forma de abuso exigem uma postura diferente. Nesses casos, estabelecer limites pode significar interromper a conversa, afastar-se temporariamente do ambiente ou buscar apoio de familiares, profissionais ou serviços especializados.</p>

<p>É importante lembrar que nenhum diagnóstico justifica violência. Ter um transtorno mental ou um transtorno de personalidade não elimina a responsabilidade pelos próprios comportamentos nem obriga outra pessoa a permanecer em uma situação de risco.</p>

<p>Proteger-se não representa abandono. Representa reconhecer que relacionamentos saudáveis precisam oferecer condições mínimas de respeito, segurança e dignidade para todos os envolvidos.</p>

<h2>O impacto psicológico sobre familiares e parceiros</h2>

<p>Quem convive durante muito tempo com conflitos intensos frequentemente desenvolve consequências emocionais importantes. Algumas pessoas passam a duvidar constantemente da própria percepção. Outras apresentam sintomas de ansiedade, dificuldades para dormir, irritabilidade, redução da autoestima ou sensação permanente de alerta.</p>

<p>Também é comum que amigos e familiares se afastem gradualmente, deixando a pessoa ainda mais isolada. Esse isolamento aumenta a dependência emocional do relacionamento e dificulta enxergar alternativas mais saudáveis.</p>

<p>Na clínica, observa-se que muitos parceiros chegam à psicoterapia acreditando que precisam aprender a "consertar" o outro. Aos poucos, descobrem que a principal transformação acontece quando voltam a desenvolver autonomia, fortalecem sua identidade e recuperam a capacidade de tomar decisões coerentes com seus próprios valores.</p>

<p>Essa mudança costuma ser descrita como recuperar o protagonismo da própria vida. Em vez de organizar toda a existência em função das reações do outro, a pessoa volta a reconhecer seus limites, necessidades, projetos e relacionamentos significativos.</p>

<h2>Um caso clínico ilustrativo</h2>

<p>Marcelo (nome fictício) procurou atendimento após anos de desgaste emocional em seu relacionamento. Relatava que evitava conversar sobre assuntos delicados porque qualquer divergência parecia transformar-se em uma crise intensa. Com receio de provocar novas discussões, passou a concordar com situações que o incomodavam profundamente.</p>

<p>Durante o processo terapêutico, Marcelo percebeu que confundia paz com ausência de conflito. Para evitar momentos difíceis, abria mão de necessidades legítimas e acumulava frustrações. Quando finalmente se posicionava, fazia isso de maneira impulsiva, aumentando ainda mais a tensão entre o casal.</p>

<p>Ao aprender estratégias de Comunicação Não Violenta, começou a expressar sentimentos e necessidades antes que o acúmulo emocional se tornasse insustentável. Também estabeleceu limites claros para situações envolvendo ofensas e gritos, comunicando previamente como passaria a agir nesses momentos.</p>

<p>As mudanças não eliminaram todos os conflitos. Entretanto, Marcelo deixou de viver em função do medo constante das reações da outra pessoa. Independentemente das escolhas do parceiro, recuperou a sensação de coerência consigo mesmo, reduzindo significativamente seus níveis de ansiedade e exaustão emocional.</p>


<h2>Aplicações práticas e orientações</h2>

<p>Conhecer conceitos sobre Transtorno da Personalidade Borderline, narcisismo e Comunicação Não Violenta é importante, mas o verdadeiro desafio está em transformar esse conhecimento em atitudes concretas no cotidiano. Muitas pessoas compreendem racionalmente o que deveriam fazer, porém, diante de uma crise emocional, acabam reagindo de maneira automática.</p>

<p>A mudança acontece gradualmente. Ela depende de prática, repetição e autoconhecimento. Assim como alguém não aprende um novo idioma apenas lendo um livro, desenvolver uma comunicação mais saudável exige treino constante.</p>

<p>A seguir, são apresentadas estratégias que podem contribuir para fortalecer relações mais equilibradas e, principalmente, proteger sua saúde emocional.</p>

<ul>
<li><strong>Evite discutir durante momentos de intensa ativação emocional.</strong> Quando ambos estão muito alterados, a capacidade de ouvir diminui significativamente. Em vez de insistir na conversa, proponha retomá-la quando houver maior tranquilidade.</li>

<li><strong>Fale sobre comportamentos específicos.</strong> Evite generalizações como "você sempre faz isso" ou "você nunca pensa em mim". Quanto mais objetiva for sua comunicação, menores as chances de interpretações defensivas.</li>

<li><strong>Expresse necessidades em vez de acusações.</strong> Em vez de tentar convencer o outro de que ele está errado, explique aquilo de que você necessita para que a relação funcione de forma mais saudável.</li>

<li><strong>Aprenda a tolerar o desconforto.</strong> Estabelecer limites pode provocar insatisfação na outra pessoa. Isso não significa necessariamente que o limite esteja errado. Muitas vezes, ele apenas rompe um padrão antigo de funcionamento.</li>

<li><strong>Não faça promessas que você não conseguirá cumprir.</strong> Limites precisam ser realistas. Consequências impossíveis de manter acabam enfraquecendo sua credibilidade.</li>

<li><strong>Cuide da sua própria rede de apoio.</strong> Manter contato com familiares, amigos e profissionais reduz o isolamento emocional e amplia a capacidade de enfrentar situações difíceis.</li>

<li><strong>Reserve tempo para atividades que promovam bem-estar.</strong> Exercícios físicos, lazer, espiritualidade, leitura, descanso adequado e hobbies fortalecem recursos emocionais importantes.</li>

<li><strong>Evite assumir responsabilidade pelas emoções do outro.</strong> Você pode oferecer acolhimento e respeito, mas não possui controle sobre aquilo que outra pessoa sente ou decide fazer.</li>

<li><strong>Pratique a escuta ativa.</strong> Ouvir não significa concordar. Significa demonstrar interesse genuíno em compreender o que está sendo comunicado antes de formular uma resposta.</li>

<li><strong>Busque ajuda profissional quando perceber que o relacionamento está comprometendo sua saúde mental.</strong> Quanto mais cedo ocorre essa busca, maiores costumam ser as possibilidades de desenvolver estratégias eficazes de enfrentamento.</li>
</ul>

<h2>Sinais de que seus limites podem estar sendo ultrapassados</h2>

<p>Muitas pessoas demoram para perceber que estão vivendo uma relação emocionalmente adoecedora porque a adaptação acontece de forma lenta. Pequenas concessões tornam-se habituais até que, em determinado momento, a pessoa percebe que praticamente perdeu contato consigo mesma.</p>

<p>Alguns sinais merecem atenção:</p>

<ul>
<li>Você sente medo constante de desagradar a outra pessoa.</li>
<li>Deixou de expressar opiniões para evitar conflitos.</li>
<li>Afastou-se de amigos ou familiares por causa do relacionamento.</li>
<li>Sente culpa sempre que prioriza suas próprias necessidades.</li>
<li>Perdeu o interesse por atividades que antes lhe proporcionavam prazer.</li>
<li>Vive em estado permanente de alerta, antecipando possíveis crises.</li>
<li>Questiona frequentemente sua própria percepção da realidade.</li>
<li>Percebe redução significativa da autoestima desde o início da relação.</li>
</ul>

<p>Esses sinais não confirmam, por si só, a existência de um relacionamento abusivo nem indicam obrigatoriamente a presença de um transtorno de personalidade. Contudo, representam indicadores importantes de sofrimento emocional que merecem ser avaliados com atenção.</p>

<h2>Pontes para a psicoterapia</h2>

<p>Quando um relacionamento passa a ocupar grande parte da energia emocional de uma pessoa, é comum surgir a expectativa de que a solução dependa exclusivamente da mudança do outro. Entretanto, a psicoterapia propõe uma mudança de foco: compreender aquilo que está sob seu próprio campo de ação.</p>

<p>Isso não significa ignorar comportamentos inadequados nem minimizar o sofrimento provocado por eles. Significa reconhecer que sua liberdade começa quando você desenvolve recursos para responder de maneira mais consciente às situações que enfrenta.</p>

<p>Ao longo do processo psicoterapêutico, diferentes objetivos podem ser trabalhados, conforme a realidade de cada indivíduo:</p>

<ul>
<li>Fortalecimento da autoestima e da identidade pessoal.</li>
<li>Desenvolvimento de habilidades de regulação emocional.</li>
<li>Aprendizagem de Comunicação Não Violenta e assertividade.</li>
<li>Reconhecimento de padrões repetitivos de relacionamento.</li>
<li>Elaboração de experiências traumáticas.</li>
<li>Construção de limites consistentes e saudáveis.</li>
<li>Redução da ansiedade, da culpa e da autocrítica excessiva.</li>
<li>Fortalecimento da autonomia emocional.</li>
</ul>

<p>Também é importante destacar que pessoas com diagnóstico de Transtorno da Personalidade Borderline podem se beneficiar significativamente de tratamento especializado. Entre as abordagens com melhores evidências científicas encontra-se a Terapia Comportamental Dialética (Dialectical Behavior Therapy – DBT), desenvolvida por Marsha Linehan, além de outras modalidades psicoterápicas indicadas conforme avaliação clínica individual.</p>

<p>Quando há suspeita de Transtorno da Personalidade Narcisista ou de outros transtornos de personalidade, a avaliação realizada por profissionais qualificados continua sendo essencial para definição do diagnóstico e planejamento terapêutico adequado.</p>

<p>Independentemente do diagnóstico, nenhum relacionamento saudável pode depender exclusivamente do esforço de apenas uma pessoa. Relações duradouras exigem responsabilidade compartilhada, respeito mútuo e disposição para mudanças por parte de todos os envolvidos.</p>

<h2>Conclusão</h2>

<p>Conviver com alguém que apresenta intensa instabilidade emocional pode ser uma das experiências mais desafiadoras da vida. O sofrimento, entretanto, não precisa levar à perda da própria identidade.</p>

<p>Estabelecer limites saudáveis não significa abandonar quem você ama. Significa construir uma relação na qual o respeito também inclua você. Da mesma forma, praticar Comunicação Não Violenta não significa aceitar qualquer comportamento, mas escolher uma forma de comunicação que preserve dignidade, clareza e responsabilidade.</p>

<p>Compreender as diferenças entre Transtorno da Personalidade Borderline e Transtorno da Personalidade Narcisista ajuda a reduzir estigmas e evita interpretações simplistas. Pessoas não podem ser resumidas a diagnósticos. Ao mesmo tempo, reconhecer padrões relacionais adoecedores permite tomar decisões mais conscientes sobre a própria vida.</p>

<p>Assim como as raízes profundas sustentam uma árvore durante as tempestades, limites saudáveis representam o sistema de sustentação da saúde emocional. Eles não impedem que ventos fortes aconteçam, mas aumentam significativamente a capacidade de permanecer firme sem perder aquilo que existe de mais valioso: sua integridade psicológica, seus valores e sua capacidade de construir relações baseadas em respeito, confiança e cuidado mútuo.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

   INICIALIZAÇÃO GERAL DA PÁGINA

document.addEventListener('DOMContentLoaded', () => {
  loadPosts();
});
