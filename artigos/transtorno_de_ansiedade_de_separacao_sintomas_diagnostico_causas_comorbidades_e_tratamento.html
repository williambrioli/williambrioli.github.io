    content: `



<p>Imagine uma criança que, ao chegar à escola, sente um medo tão intenso de ficar longe dos pais que apresenta dores de barriga, náuseas e crises de choro. Ou um adulto que evita viagens, relacionamentos ou oportunidades profissionais porque teme que algo terrível aconteça às pessoas que ama quando está distante delas. Embora muitas pessoas associem esse tipo de preocupação ao carinho e ao vínculo afetivo, em alguns casos o sofrimento ultrapassa o esperado para a idade e passa a interferir significativamente na vida cotidiana. Esse é o cenário vivido por indivíduos com Transtorno de Ansiedade de Separação.</p>

<p>Em um caso clínico anônimo, uma mulher de 34 anos procurou psicoterapia após perceber que evitava viagens de trabalho e cancelava compromissos importantes devido ao medo constante de que seus pais sofressem acidentes enquanto ela estivesse longe. Mesmo reconhecendo que suas preocupações eram excessivas, sentia intensa angústia quando não conseguia contato imediato com familiares. Com o passar do tempo, sua vida profissional e social começou a ser limitada pelo sofrimento emocional.</p>

<p>O Transtorno de Ansiedade de Separação é uma condição reconhecida pelo Manual Diagnóstico e Estatístico de Transtornos Mentais – DSM-5-TR, caracterizada por medo ou ansiedade excessivos e inadequados em relação ao estágio do desenvolvimento diante da separação de pessoas com as quais existe forte vínculo afetivo.</p>

<h2>Explicação científica simplificada</h2>

<p>A ansiedade de separação é considerada uma resposta natural em determinadas fases do desenvolvimento humano, especialmente na infância. Crianças pequenas frequentemente demonstram desconforto quando se afastam de seus cuidadores principais. Entretanto, quando esse medo se torna excessivo, persistente e causa prejuízos significativos, pode indicar a presença de um transtorno.</p>

<p>Segundo o DSM-5-TR, o Transtorno de Ansiedade de Separação envolve medo ou ansiedade excessivos relacionados à separação de figuras de apego. O diagnóstico exige a presença de pelo menos três manifestações características, persistindo por período significativo e causando sofrimento clinicamente relevante ou prejuízo no funcionamento social, acadêmico, profissional ou em outras áreas importantes da vida.</p>

<p>Entre as características diagnósticas mais comuns estão:</p>

<ul>
<li>Sofrimento excessivo diante de separações reais ou antecipadas.</li>
<li>Preocupação persistente com a possibilidade de perder figuras de apego.</li>
<li>Medo de que acontecimentos adversos provoquem separação permanente.</li>
<li>Resistência ou recusa em sair de casa ou permanecer longe de pessoas significativas.</li>
<li>Medo ou recusa em ficar sozinho.</li>
<li>Relutância em dormir longe das figuras de apego.</li>
<li>Pesadelos envolvendo temas de separação.</li>
<li>Sintomas físicos recorrentes quando ocorre ou é antecipada a separação.</li>
</ul>

<p>Uma metáfora útil é imaginar que o sistema emocional da pessoa funciona como um alarme de incêndio extremamente sensível. Mesmo diante de situações seguras e comuns, o alarme dispara com intensidade máxima, produzindo sofrimento e comportamentos de evitação.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Do ponto de vista clínico, o Transtorno de Ansiedade de Separação envolve muito mais do que dependência emocional ou apego intenso. Trata-se de um padrão persistente de medo associado à percepção de ameaça relacionada à perda, abandono ou afastamento de pessoas significativas.</p>

<p>Embora frequentemente identificado na infância, o DSM-5-TR reconhece que o transtorno pode ocorrer em qualquer fase da vida. Muitos adultos convivem durante anos com sintomas sem compreender que existe uma condição psicológica específica por trás de seus comportamentos.</p>

<p>Entre as características associativas frequentemente observadas estão a necessidade excessiva de proximidade, dificuldade de autonomia emocional, insegurança diante de mudanças e elevada sensibilidade a situações que envolvam afastamento físico ou emocional.</p>

<p>Algumas pessoas apresentam comportamentos de verificação constante, realizando inúmeras ligações ou mensagens para confirmar a segurança de familiares. Outras desenvolvem padrões de evitação que limitam significativamente sua independência.</p>

<p>É importante destacar que o medo experimentado não é simplesmente uma escolha racional. O indivíduo geralmente reconhece que suas preocupações podem ser exageradas, mas ainda assim sente intensa ansiedade diante da possibilidade de separação.</p>

<p>Nos contextos familiares, esse padrão pode gerar desgaste emocional tanto para quem sofre quanto para aqueles que tentam oferecer suporte. Familiares frequentemente passam a adaptar suas rotinas para reduzir o sofrimento da pessoa, o que pode reforçar involuntariamente o ciclo ansioso.</p>

<h2>Prevalência</h2>

<p>O DSM-5-TR descreve o Transtorno de Ansiedade de Separação como um dos transtornos de ansiedade mais frequentes na infância. Embora seja mais comum em crianças, também pode persistir ou surgir na vida adulta.</p>

<p>A prevalência tende a ser maior entre crianças do que entre adolescentes e adultos. Entretanto, o reconhecimento do transtorno em adultos aumentou significativamente nos últimos anos, contribuindo para diagnósticos mais precisos.</p>

<p>O transtorno pode afetar indivíduos de diferentes contextos culturais, sociais e econômicos, demonstrando que o fenômeno está relacionado a múltiplos fatores biológicos, psicológicos e ambientais.</p>

<h2>Desenvolvimento e curso</h2>

<p>Os primeiros sinais frequentemente surgem durante a infância. Em muitos casos, os sintomas aparecem após experiências estressantes, mudanças importantes ou eventos que envolvam perda, adoecimento ou afastamento de figuras significativas.</p>

<p>O curso do transtorno pode variar amplamente. Algumas crianças apresentam melhora gradual ao longo do desenvolvimento. Outras continuam manifestando sintomas durante a adolescência e a vida adulta.</p>

<p>Em adultos, os sintomas podem assumir formas diferentes. O medo da separação pode estar relacionado a parceiros afetivos, filhos, pais ou outras pessoas consideradas fundamentais para a sensação de segurança emocional.</p>

<p>Períodos de transição, mudanças profissionais, casamento, nascimento de filhos, doenças familiares ou perdas importantes podem intensificar os sintomas.</p>

<h2>Fatores de risco e prognóstico</h2>

<p>O DSM-5-TR descreve diversos fatores associados ao desenvolvimento do transtorno.</p>

<ul>
<li>Histórico familiar de transtornos de ansiedade.</li>
<li>Temperamento caracterizado por inibição comportamental.</li>
<li>Maior sensibilidade ao estresse.</li>
<li>Experiências de perda ou separação.</li>
<li>Eventos potencialmente traumáticos.</li>
<li>Superproteção familiar em alguns contextos.</li>
</ul>

<p>O prognóstico varia conforme a intensidade dos sintomas, a presença de suporte social, o acesso ao tratamento e a existência de outras condições psicológicas associadas.</p>

<p>Quando identificado precocemente e acompanhado adequadamente, existe maior possibilidade de redução do sofrimento e ampliação da autonomia emocional.</p>

<h2>Associação com pensamentos ou comportamentos suicidas</h2>

<p>O DSM-5-TR destaca que transtornos de ansiedade podem estar associados a maior sofrimento emocional e aumento do risco de ideação suicida em determinados indivíduos, especialmente quando coexistem outras condições psiquiátricas.</p>

<p>Isso não significa que pessoas com Transtorno de Ansiedade de Separação necessariamente apresentarão pensamentos suicidas. Entretanto, o sofrimento intenso, a sensação de incapacidade para lidar com separações e a presença de comorbidades podem aumentar a vulnerabilidade emocional.</p>

<p>Por essa razão, a avaliação clínica cuidadosa é fundamental, principalmente quando há sintomas depressivos, desesperança ou prejuízo significativo na qualidade de vida.</p>

<h2>Consequências funcionais do Transtorno de Ansiedade de Separação</h2>

<p>Os impactos do transtorno podem ser amplos e atingir diferentes áreas da vida.</p>

<ul>
<li>Dificuldades escolares.</li>
<li>Absenteísmo acadêmico.</li>
<li>Limitações profissionais.</li>
<li>Restrição da autonomia pessoal.</li>
<li>Dificuldades em viagens e deslocamentos.</li>
<li>Prejuízos nos relacionamentos.</li>
<li>Dependência emocional excessiva.</li>
<li>Isolamento social.</li>
</ul>

<p>Em alguns casos, oportunidades importantes são evitadas devido ao medo intenso da separação. Assim, o transtorno não afeta apenas o estado emocional, mas também o desenvolvimento pessoal, social e profissional.</p>

<h2>Diagnóstico diferencial</h2>

<p>O diagnóstico diferencial é essencial para evitar interpretações equivocadas.</p>

<p>O Transtorno de Ansiedade de Separação deve ser diferenciado de condições como:</p>

<ul>
<li>Transtorno de Ansiedade Generalizada.</li>
<li>Transtorno do Pânico.</li>
<li>Agorafobia.</li>
<li>Transtorno do Espectro Autista.</li>
<li>Transtorno de Ansiedade Social.</li>
<li>Transtorno Depressivo Maior.</li>
<li>Transtorno de Personalidade Dependente.</li>
</ul>

<p>A principal diferença está no foco predominante do medo. No Transtorno de Ansiedade de Separação, a preocupação central envolve a perda, o afastamento ou a separação de figuras de apego.</p>

<h2>Comorbidade</h2>

<p>O DSM-5-TR indica que o Transtorno de Ansiedade de Separação frequentemente ocorre em associação com outros transtornos mentais.</p>

<p>Entre as comorbidades mais observadas estão:</p>

<ul>
<li>Outros transtornos de ansiedade.</li>
<li>Transtornos depressivos.</li>
<li>Transtorno Obsessivo-Compulsivo.</li>
<li>Transtorno de Estresse Pós-Traumático.</li>
<li>Transtorno do Pânico.</li>
</ul>

<p>A presença de comorbidades pode aumentar a complexidade clínica e influenciar diretamente a intensidade dos sintomas e o prognóstico.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Reconheça que ansiedade intensa diante de separações pode indicar sofrimento psicológico significativo.</li>
<li>Observe se os sintomas estão causando prejuízo em áreas importantes da vida.</li>
<li>Evite interpretar o problema apenas como dependência emocional ou falta de maturidade.</li>
<li>Procure avaliação profissional quando os sintomas forem persistentes.</li>
<li>Desenvolva gradualmente experiências de autonomia emocional.</li>
<li>Aprenda estratégias saudáveis de regulação emocional.</li>
<li>Busque apoio social sem transformar relacionamentos em única fonte de segurança.</li>
<li>Valorize pequenos avanços na capacidade de tolerar separações temporárias.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia oferece um espaço seguro para compreender os significados emocionais associados ao medo da separação. Muitas vezes, experiências de perda, insegurança, abandono ou vínculos afetivos marcantes influenciam a forma como a pessoa percebe o afastamento de pessoas importantes.</p>

<p>O processo terapêutico pode ajudar no desenvolvimento da autonomia emocional, na ampliação da tolerância à incerteza e na construção de recursos internos capazes de reduzir o sofrimento associado às separações.</p>

<p>Além da redução dos sintomas, a psicoterapia favorece o fortalecimento da autoestima, a compreensão dos padrões relacionais e o desenvolvimento de formas mais saudáveis de estabelecer vínculos afetivos.</p>

<h2>Conclusão</h2>

<p>O Transtorno de Ansiedade de Separação é uma condição psicológica real, reconhecida pelo DSM-5-TR e caracterizada por medo intenso e persistente relacionado à separação de figuras de apego. Embora possa surgir na infância, também afeta adolescentes e adultos, produzindo impactos importantes na vida emocional, social e profissional.</p>

<p>Compreender suas características diagnósticas, fatores de risco, consequências funcionais e possibilidades de tratamento é um passo fundamental para reduzir o sofrimento e promover maior qualidade de vida. Buscar ajuda profissional não significa fraqueza, mas sim um movimento de cuidado consigo mesmo e de fortalecimento da própria autonomia emocional.</p>

</ul>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

document.addEventListener('DOMContentLoaded', () => {
