// 📝 Conteúdo do artigo (TEXTO DO ARTIGO FICA AQUI) /*
        
    content: `


<p>Imagine uma pessoa que passa o dia inteiro funcionando no “modo alerta”. O coração acelera antes mesmo de abrir uma mensagem no celular. A mente antecipa problemas que ainda nem aconteceram. O corpo permanece tenso como se estivesse se preparando para uma ameaça invisível. Em alguns momentos, ela até consegue continuar trabalhando, estudando e convivendo socialmente. Porém, internamente, vive cansada, preocupada e emocionalmente sobrecarregada.</p>

<p>Esse cenário é mais comum do que parece. A ansiedade faz parte da experiência humana e, em certa medida, possui uma função importante de proteção e sobrevivência. Entretanto, quando ela deixa de ser proporcional à realidade e passa a interferir na qualidade de vida, nos relacionamentos, no sono, na concentração e no funcionamento emocional, pode indicar um transtorno de ansiedade.</p>

<p>Na prática clínica, muitas pessoas chegam à psicoterapia acreditando que possuem apenas “nervosismo” ou “excesso de preocupação”. Outras convivem durante anos com sintomas físicos e emocionais sem compreender que estão diante de um quadro ansioso. Compreender a diferença entre ansiedade normal e ansiedade patológica é um passo importante para buscar ajuda de maneira consciente e acolhedora.</p>

<h2>Explicação científica simplificada</h2>

<p>A ansiedade é uma resposta natural do organismo diante de situações percebidas como ameaça, perigo ou incerteza. Ela prepara o corpo para reagir, aumentando o estado de alerta, a atenção e a ativação fisiológica. Em níveis adequados, a ansiedade pode ajudar na tomada de decisões, na proteção e até no desempenho em situações importantes.</p>

<p>Segundo o <strong>DSM-5-TR</strong> (Manual Diagnóstico e Estatístico de Transtornos Mentais – Texto Revisado) e a <strong>CID-11</strong> (Classificação Internacional de Doenças), os transtornos de ansiedade envolvem medo e preocupação excessivos, persistentes e desproporcionais em relação ao contexto vivido.</p>

<p>Uma metáfora simples ajuda a compreender isso: a ansiedade normal funciona como um alarme de incêndio que dispara quando realmente existe fumaça. Já a ansiedade patológica se parece com um alarme extremamente sensível, que dispara mesmo quando alguém apenas acende uma vela.</p>

<p>Entre os sintomas mais comuns dos transtornos de ansiedade estão:</p>

<ul>
  <li>Preocupação excessiva e constante;</li>
  <li>Medo intenso sem ameaça proporcional;</li>
  <li>Tensão muscular;</li>
  <li>Taquicardia;</li>
  <li>Sensação de falta de ar;</li>
  <li>Insônia;</li>
  <li>Dificuldade de concentração;</li>
  <li>Irritabilidade;</li>
  <li>Fadiga mental;</li>
  <li>Sensação frequente de perigo iminente.</li>
</ul>

<p>O DSM-5-TR descreve diferentes transtornos relacionados à ansiedade, como:</p>

<ul>
  <li>Transtorno de Ansiedade Generalizada (TAG);</li>
  <li>Transtorno do Pânico;</li>
  <li>Fobias específicas;</li>
  <li>Ansiedade social;</li>
  <li>Agorafobia;</li>
  <li>Transtorno de ansiedade de separação.</li>
</ul>

<p>A CID-11 também reconhece esses transtornos e destaca o impacto funcional causado pela ansiedade persistente, especialmente quando ela compromete a vida social, profissional, acadêmica ou emocional.</p>

<p>Do ponto de vista neurobiológico, a ansiedade envolve áreas cerebrais relacionadas à sobrevivência e à percepção de ameaça, como a amígdala cerebral, além da participação de neurotransmissores como serotonina, noradrenalina e GABA. O organismo entra em um estado de hiperativação fisiológica, como se estivesse constantemente preparado para reagir a perigos.</p>

<p>Entretanto, nem toda ansiedade é doença. Sentir ansiedade antes de uma entrevista de emprego, de uma prova, de uma apresentação ou de uma decisão importante é esperado e saudável. O problema começa quando a ansiedade se torna intensa, persistente e incapacitante.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na clínica psicológica e psicanalítica, a ansiedade costuma aparecer não apenas como um sintoma isolado, mas como um sinal de sofrimento emocional mais profundo. Muitas vezes, ela está relacionada a conflitos internos, experiências traumáticas, excesso de autocobrança, medo de rejeição, insegurança afetiva ou dificuldade em lidar com incertezas.</p>

<p>Em diversos casos, a pessoa desenvolve um padrão constante de antecipação negativa. A mente tenta prever todos os cenários possíveis como forma de proteção, mas acaba gerando exaustão emocional. É como viver diariamente tentando controlar o futuro.</p>

<p>Um caso clínico anônimo bastante comum envolve pessoas que chegam ao consultório relatando sintomas físicos recorrentes — dores no peito, sensação de sufocamento, tontura, tremores e insônia — após terem realizado diversos exames médicos sem alterações significativas. Em muitos desses casos, o sofrimento emocional estava sendo expresso pelo próprio corpo.</p>

<p>A ansiedade patológica também pode provocar um ciclo de manutenção emocional:</p>

<ul>
  <li>A pessoa sente medo;</li>
  <li>O corpo reage intensamente;</li>
  <li>Ela interpreta os sintomas como ameaça;</li>
  <li>O medo aumenta;</li>
  <li>O organismo entra em mais alerta.</li>
</ul>

<p>Esse funcionamento pode gerar crises de ansiedade, ataques de pânico e comportamentos de evitação. Algumas pessoas deixam de sair de casa, evitam lugares cheios, situações sociais ou ambientes associados ao medo.</p>

<p>Na psicanálise, a ansiedade também pode ser compreendida como uma manifestação ligada a conteúdos emocionais inconscientes. Sigmund Freud descreveu a ansiedade como um sinal psíquico relacionado a conflitos internos e mecanismos de defesa do ego. Já abordagens contemporâneas ampliam essa compreensão ao considerar fatores emocionais, cognitivos, biológicos e relacionais.</p>

<p>Outro aspecto importante é que muitas pessoas aprendem a funcionar em estado permanente de tensão. Elas acreditam que viver preocupadas o tempo todo é normal. Com o passar do tempo, o corpo perde a capacidade de relaxamento, surgindo sintomas como fadiga crônica, irritabilidade, dificuldade para dormir e sensação constante de sobrecarga mental.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Embora cada caso precise ser compreendido individualmente, algumas atitudes podem ajudar no manejo da ansiedade e no fortalecimento da saúde emocional.</p>

<ul>
  <li>Observar padrões de pensamento excessivamente negativos ou catastróficos;</li>
  <li>Identificar gatilhos emocionais e situações que aumentam a ansiedade;</li>
  <li>Estabelecer rotina de sono mais regular;</li>
  <li>Reduzir excesso de estímulos e sobrecarga mental;</li>
  <li>Praticar atividades físicas de forma equilibrada;</li>
  <li>Diminuir consumo excessivo de cafeína e estimulantes;</li>
  <li>Buscar momentos reais de descanso mental;</li>
  <li>Desenvolver consciência emocional;</li>
  <li>Evitar isolamento prolongado;</li>
  <li>Buscar ajuda profissional quando os sintomas persistirem.</li>
</ul>

<p>Uma orientação importante é compreender que controlar absolutamente tudo é impossível. Muitas pessoas ansiosas vivem tentando eliminar qualquer risco, imprevisibilidade ou desconforto emocional. Porém, parte do processo terapêutico envolve justamente desenvolver tolerância às incertezas da vida.</p>

<p>A ansiedade também costuma aumentar em contextos de excesso de autocobrança. Pessoas muito perfeccionistas frequentemente sentem necessidade constante de desempenho elevado, medo de falhar e dificuldade em descansar sem culpa.</p>

<p>Outro ponto relevante é diferenciar produtividade de estado de alerta constante. Estar acelerado o tempo inteiro não significa necessariamente estar saudável ou funcionando bem emocionalmente.</p>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia pode ajudar a pessoa ansiosa a compreender não apenas os sintomas, mas também os significados emocionais envolvidos naquele sofrimento.</p>

<p>O processo terapêutico oferece um espaço seguro para identificar padrões emocionais, crenças internas, experiências passadas e formas de funcionamento que alimentam a ansiedade. Em muitos casos, o indivíduo passa anos tentando apenas “controlar sintomas”, sem compreender as raízes emocionais daquilo que sente.</p>

<p>Na terapia, a pessoa pode desenvolver:</p>

<ul>
  <li>Maior consciência emocional;</li>
  <li>Capacidade de identificar gatilhos;</li>
  <li>Estratégias de regulação emocional;</li>
  <li>Redução da autocobrança excessiva;</li>
  <li>Melhor relação consigo mesma;</li>
  <li>Maior compreensão sobre seus medos e inseguranças.</li>
</ul>

<p>A psicoterapia também ajuda a diferenciar sofrimento emocional temporário de transtornos que necessitam de acompanhamento contínuo. Em alguns casos, o trabalho multidisciplinar com acompanhamento psiquiátrico pode ser necessário.</p>

<p>Buscar terapia não significa fraqueza. Pelo contrário: muitas vezes representa um movimento de consciência, coragem e cuidado consigo mesmo.</p>

<h2>Conclusão</h2>

<p>A ansiedade faz parte da condição humana. Todos nós sentimos medo, preocupação e insegurança em diferentes momentos da vida. Entretanto, quando a ansiedade deixa de ser uma reação proporcional e passa a dominar pensamentos, emoções e comportamentos, ela pode indicar um transtorno que merece atenção e cuidado.</p>

<p>Compreender a diferença entre ansiedade normal e ansiedade patológica ajuda a reduzir preconceitos e favorece a busca por ajuda profissional. O sofrimento emocional não deve ser ignorado nem tratado apenas como “frescura”, “fraqueza” ou “falta de controle”.</p>

<p>Assim como o corpo adoece, a mente também pode entrar em estado de sobrecarga. E, da mesma forma que buscamos ajuda para dores físicas, também é saudável procurar apoio quando o sofrimento emocional começa a afetar nossa qualidade de vida.</p>

<p>Em muitos casos, a ansiedade não desaparece apenas tentando “pensar positivo”. Ela precisa ser compreendida, acolhida e trabalhada de maneira responsável, ética e humanizada.</p>

/*

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}

let POSTS_CACHE = [];

  const grid = document.getElementById('postsGrid');

  msgEl.style.display = 'none';
  msgEl.textContent = '';

    // Busca o arquivo que contém os posts

      throw new Error('Não foi possível carregar a lista de artigos.');

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
