    content: `



<p>Juliana procurou terapia porque sentia que estava cansada de lutar contra si mesma. Quanto mais tentava não sentir ansiedade, mais ansiosa ficava. Quanto mais tentava afastar pensamentos negativos, mais eles pareciam voltar com força. Havia lido livros, assistido vídeos e buscado diversas estratégias para controlar suas emoções, mas a sensação era a mesma: uma batalha constante dentro da própria mente.</p>

<p>Durante as primeiras sessões, ela ouviu uma ideia que lhe pareceu estranha. Em vez de aprender a eliminar pensamentos e emoções difíceis, talvez fosse possível aprender uma nova forma de se relacionar com eles. Essa proposta está no centro da Terapia de Aceitação e Compromisso, conhecida internacionalmente como ACT (Acceptance and Commitment Therapy).</p>

<p>A ACT é uma abordagem moderna da psicoterapia baseada em evidências científicas que busca ajudar as pessoas a desenvolverem flexibilidade psicológica. Em vez de concentrar esforços em controlar tudo o que acontece internamente, ela ensina habilidades para viver uma vida mais alinhada com valores pessoais, mesmo na presença de emoções difíceis, pensamentos desagradáveis ou situações desafiadoras.</p>

<p>Para muitas pessoas, essa mudança de perspectiva representa uma verdadeira transformação. Afinal, nem sempre é possível controlar o que sentimos, mas podemos aprender a escolher como responder ao que sentimos.</p>

<h2>Explicação científica simplificada</h2>

<p>A Terapia de Aceitação e Compromisso (ACT) foi desenvolvida pelo psicólogo norte-americano Steven C. Hayes a partir da década de 1980. Ela faz parte das chamadas terapias contextuais ou terapias cognitivo-comportamentais de terceira geração, que incluem abordagens focadas na relação que temos com nossos pensamentos e emoções.</p>

<p>O principal objetivo da ACT é desenvolver aquilo que os pesquisadores chamam de flexibilidade psicológica. Esse conceito refere-se à capacidade de permanecer em contato com o momento presente, aceitar experiências internas inevitáveis e agir de acordo com aquilo que é importante para a própria vida.</p>

<p>Uma das premissas centrais da ACT é que o sofrimento humano muitas vezes aumenta quando tentamos controlar excessivamente pensamentos, emoções e sensações que fazem parte da experiência natural de viver.</p>

<p>Por exemplo, imagine alguém que sente ansiedade ao falar em público. Se a pessoa acredita que precisa eliminar completamente a ansiedade antes de realizar uma apresentação, pode acabar evitando oportunidades profissionais importantes. Nesse caso, o problema deixa de ser apenas a ansiedade e passa a ser a luta constante contra ela.</p>

<p>A ACT propõe uma alternativa. Em vez de gastar energia tentando eliminar emoções inevitáveis, a pessoa aprende a aceitá-las quando surgem e continua caminhando em direção aos seus objetivos e valores.</p>

<p>Importante destacar que aceitação, na ACT, não significa resignação, conformismo ou desistência. Aceitar significa reconhecer a realidade da experiência presente sem desperdiçar energia lutando contra aquilo que não pode ser controlado naquele momento.</p>

<p>A abordagem é baseada em seis processos centrais:</p>

<ul>
<li>Aceitação.</li>
<li>Desfusão cognitiva.</li>
<li>Contato com o momento presente.</li>
<li>Eu observador.</li>
<li>Clareza de valores.</li>
<li>Ação comprometida.</li>
</ul>

<p>Esses processos trabalham juntos para ampliar a capacidade de adaptação diante dos desafios da vida.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, muitas pessoas chegam à psicoterapia acreditando que o objetivo do tratamento é eliminar completamente emoções desagradáveis. Entretanto, emoções como medo, tristeza, insegurança, frustração e ansiedade fazem parte da experiência humana normal.</p>

<p>O sofrimento costuma aumentar quando essas emoções passam a ser vistas como inimigas que precisam ser combatidas a qualquer custo.</p>

<p>A ACT observa que grande parte dos problemas emocionais está relacionada ao fenômeno conhecido como esquiva experiencial. Esse termo descreve a tentativa constante de evitar, controlar ou fugir de experiências internas consideradas desagradáveis.</p>

<p>Uma pessoa pode evitar relacionamentos por medo de rejeição. Outra pode deixar de buscar oportunidades profissionais por receio de fracassar. Alguém pode recorrer ao excesso de trabalho, redes sociais, compras ou outros comportamentos para fugir temporariamente de emoções difíceis.</p>

<p>Embora essas estratégias possam trazer alívio imediato, frequentemente produzem limitações significativas no longo prazo.</p>

<p>Dentro da ACT, busca-se desenvolver uma relação mais saudável com os próprios pensamentos. Um conceito importante é a desfusão cognitiva, que consiste em aprender a observar pensamentos como eventos mentais, e não como verdades absolutas.</p>

<p>Por exemplo, existe uma diferença significativa entre pensar "sou um fracasso" e perceber que "estou tendo o pensamento de que sou um fracasso". A segunda postura cria espaço psicológico para analisar a situação com mais flexibilidade.</p>

<p>Essa mudança pode parecer sutil, mas frequentemente produz impactos importantes na forma como as pessoas lidam com desafios emocionais.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Os princípios da ACT podem ser aplicados em diversas situações do cotidiano, especialmente quando estamos diante de emoções ou pensamentos difíceis.</p>

<p>Uma metáfora frequentemente utilizada nessa abordagem é a da areia movediça. Quando uma pessoa cai em areia movediça, sua tendência natural é lutar desesperadamente para sair. No entanto, quanto mais se debate, mais afunda. A saída envolve reduzir a luta e aprender movimentos mais eficazes.</p>

<p>De forma semelhante, algumas experiências emocionais tornam-se mais intensas quando travamos uma guerra permanente contra elas.</p>

<p>Algumas práticas inspiradas na ACT incluem:</p>

<ul>
<li>Observar pensamentos sem classificá-los imediatamente como verdadeiros ou falsos.</li>
<li>Reconhecer emoções sem tentar suprimi-las.</li>
<li>Desenvolver consciência do momento presente.</li>
<li>Identificar valores pessoais importantes.</li>
<li>Tomar decisões alinhadas aos próprios valores.</li>
<li>Reduzir comportamentos de evitação emocional.</li>
<li>Praticar autocompaixão diante de dificuldades.</li>
</ul>

<p>Uma pergunta frequentemente utilizada na ACT é: "O que realmente importa para você nesta situação?"</p>

<p>Essa pergunta ajuda a deslocar o foco do controle emocional absoluto para a construção de uma vida significativa.</p>

<p>Por exemplo, alguém pode sentir medo ao iniciar um relacionamento. Em vez de esperar que o medo desapareça completamente, pode escolher agir em direção ao valor do amor, da conexão e da intimidade.</p>

<p>Da mesma forma, uma pessoa pode sentir ansiedade antes de uma entrevista de emprego e, ainda assim, seguir adiante porque valoriza crescimento profissional e realização pessoal.</p>

<h2>Pontes para psicoterapia</h2>

<p>Considere o caso fictício de Marcelo, de 38 anos. Durante anos, ele tentou controlar pensamentos relacionados ao medo de fracassar profissionalmente. Sempre que surgiam dúvidas ou inseguranças, evitava assumir novos projetos e recusava oportunidades de crescimento.</p>

<p>Inicialmente, essas decisões pareciam protegê-lo do desconforto emocional. Porém, com o passar do tempo, Marcelo começou a sentir frustração, estagnação e perda de propósito.</p>

<p>Durante a psicoterapia baseada em ACT, ele passou a compreender que sua vida estava sendo guiada pelo esforço de evitar o medo, e não pelos valores que considerava importantes.</p>

<p>Aos poucos, aprendeu a reconhecer pensamentos de insegurança sem permitir que eles determinassem todas as suas escolhas. O medo não desapareceu completamente, mas deixou de ocupar o papel de comandante da sua vida.</p>

<p>Essa é uma das principais contribuições da ACT para a psicoterapia. Ela não promete eliminar o sofrimento humano, mas ajuda as pessoas a construírem uma relação diferente com esse sofrimento.</p>

<p>A abordagem possui evidências científicas para diversos contextos clínicos, incluindo transtornos de ansiedade, depressão, dor crônica, estresse, transtorno obsessivo-compulsivo, dificuldades de adaptação, sofrimento relacionado a doenças físicas e promoção de saúde mental em geral.</p>

<p>Para quem busca terapia, a ACT oferece uma proposta acolhedora e profundamente humana: aprender a viver de forma significativa mesmo quando a vida não acontece exatamente como gostaríamos.</p>

<h2>Conclusão</h2>

<p>A Terapia de Aceitação e Compromisso representa uma mudança importante na forma de compreender a saúde emocional. Em vez de focar exclusivamente na eliminação do sofrimento, ela ensina habilidades para construir uma vida rica em significado, propósito e coerência com valores pessoais.</p>

<p>Seus princípios mostram que pensamentos difíceis, emoções desagradáveis e momentos de dor fazem parte da experiência humana. O que realmente determina a qualidade de vida não é a ausência dessas experiências, mas a forma como nos relacionamos com elas.</p>

<p>Assim como um navegador não controla os ventos do oceano, mas pode ajustar suas velas para continuar seguindo seu destino, a ACT ensina que não precisamos controlar tudo o que acontece dentro de nós para avançar em direção ao que realmente importa.</p>

<p>Ao desenvolver aceitação, consciência e compromisso com valores pessoais, torna-se possível construir uma vida mais flexível, autêntica e alinhada com aquilo que dá sentido à existência.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
