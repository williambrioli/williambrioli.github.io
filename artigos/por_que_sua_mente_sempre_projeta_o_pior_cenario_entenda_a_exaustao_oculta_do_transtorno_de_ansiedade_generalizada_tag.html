    content: `



<p>Imagine acordar e, antes mesmo de sair da cama, sua mente já apresentar um filme completo sobre tudo o que pode dar errado naquele dia. Um atraso se transforma em demissão. Uma dor de cabeça vira uma doença grave. Uma mensagem sem resposta passa a significar rejeição. Um pequeno erro parece anunciar um grande fracasso.</p>

<p>Esse era o relato de uma pessoa que procurou ajuda terapêutica após anos convivendo com uma sensação permanente de alerta. Embora sua vida estivesse relativamente estável, sua mente jamais permitia descanso. Sempre existia um novo risco para antecipar. Um novo desastre para evitar.</p>

<p>Esse funcionamento não era falta de inteligência nem excesso de imaginação. Pelo contrário: era o resultado de um cérebro tentando proteger alguém de um perigo que, na maior parte das vezes, nunca acontecia.</p>

<p>Quando esse padrão se torna persistente, intenso e difícil de controlar, pode estar relacionado ao Transtorno de Ansiedade Generalizada (TAG), um transtorno caracterizado por preocupação excessiva e constante em diversas áreas da vida. A consequência costuma ser um profundo desgaste emocional, físico e mental que muitas pessoas carregam durante anos sem compreender sua origem.</p>

<h2>Explicação científica simplificada</h2>

<p>O Transtorno de Ansiedade Generalizada é descrito pelos principais manuais diagnósticos como uma condição marcada por preocupação excessiva, difícil de controlar e presente na maior parte dos dias por vários meses.</p>

<p>Diferentemente da ansiedade considerada normal, que surge diante de desafios reais, a ansiedade do TAG permanece mesmo quando não existe um perigo concreto. A mente passa a funcionar como um sistema de vigilância permanente.</p>

<p>Uma metáfora simples ajuda a compreender esse processo.</p>

<p>Imagine um detector de fumaça instalado em uma casa. Sua função é extremamente importante: avisar quando existe um incêndio.</p>

<p>Agora imagine que esse detector esteja extremamente sensível. Ele dispara quando alguém faz café, toma banho quente ou prepara o almoço. O problema deixa de ser a fumaça. O problema passa a ser o detector.</p>

<p>É exatamente isso que acontece no TAG. O cérebro interpreta acontecimentos comuns como possíveis ameaças. A pessoa tenta prever todos os cenários negativos acreditando que, se pensar suficientemente sobre eles, conseguirá impedir o sofrimento futuro.</p>

<p>Essa estratégia parece lógica, mas produz justamente o efeito contrário.</p>

<p>Cada preocupação alimenta outra preocupação. Cada tentativa de controle fortalece a sensação de insegurança. Aos poucos, a pessoa começa a viver mais dentro das possibilidades imaginadas do que da realidade presente.</p>

<p>Pesquisas em neurociência mostram que regiões cerebrais envolvidas na detecção de ameaças, especialmente a amígdala cerebral, apresentam maior ativação em pessoas com transtornos de ansiedade. Ao mesmo tempo, áreas relacionadas ao controle emocional e à regulação cognitiva podem apresentar maior dificuldade para reduzir essa resposta de alerta.</p>

<p>Esse processo explica por que muitas pessoas dizem frases como:</p>

<ul>
<li>"Eu sei que provavelmente não vai acontecer, mas não consigo parar de pensar."</li>
<li>"Minha cabeça nunca desliga."</li>
<li>"Sempre acho que existe alguma coisa errada."</li>
<li>"Quando um problema termina, outro já aparece na minha mente."</li>
</ul>

<p>Esses pensamentos não representam falta de força de vontade. Eles fazem parte de um funcionamento psicológico e neurobiológico bastante conhecido pela ciência.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, observa-se que muitas pessoas não chegam ao consultório dizendo que sofrem de ansiedade. Elas procuram ajuda porque estão cansadas.</p>

<p>Cansadas de pensar.</p>

<p>Cansadas de tentar controlar tudo.</p>

<p>Cansadas de nunca conseguir relaxar.</p>

<p>A exaustão costuma ser uma das faces menos percebidas do TAG.</p>

<p>A preocupação constante exige enorme consumo de energia mental. Enquanto o corpo tenta descansar, a mente continua produzindo hipóteses, cenários e estratégias para evitar acontecimentos futuros.</p>

<p>Esse funcionamento pode comprometer o sono, aumentar a tensão muscular, provocar irritabilidade, reduzir a capacidade de concentração e favorecer sintomas físicos como dores de cabeça, desconfortos gastrointestinais, fadiga e sensação permanente de inquietação.</p>

<p>Do ponto de vista psicológico, existe ainda outro aspecto importante.</p>

<p>Muitas pessoas acreditam que se preocupar é uma forma de responsabilidade. Pensam que, se deixarem de antecipar problemas, estarão sendo imprudentes.</p>

<p>Assim, a preocupação passa a ser confundida com prevenção.</p>

<p>Entretanto, existe uma diferença significativa entre planejar e preocupar-se.</p>

<p>Planejamento produz organização.</p>

<p>Preocupação excessiva produz desgaste.</p>

<p>Planejar significa agir sobre aquilo que depende de nós.</p>

<p>Preocupar-se excessivamente significa gastar energia tentando controlar aquilo que ainda não aconteceu.</p>

<p>Esse padrão frequentemente gera um ciclo difícil de romper.</p>

<ul>
<li>A mente imagina o pior cenário.</li>
<li>O corpo responde como se o perigo fosse real.</li>
<li>A tensão aumenta.</li>
<li>O cérebro interpreta essa tensão como confirmação de que existe uma ameaça.</li>
<li>Novos pensamentos catastróficos surgem.</li>
</ul>

<p>Com o passar do tempo, a pessoa passa a confiar mais em seus medos do que em suas próprias experiências reais.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Embora o tratamento adequado deva ser individualizado, algumas estratégias podem ajudar a reduzir o impacto da preocupação excessiva no cotidiano.</p>

<ul>
<li>Observe quando sua mente está imaginando possibilidades e quando está lidando com fatos concretos.</li>
<li>Pergunte a si mesmo: "Existe alguma evidência objetiva de que esse cenário realmente vai acontecer?"</li>
<li>Evite buscar certeza absoluta. Em muitos casos, aprender a conviver com pequenas incertezas reduz significativamente a ansiedade.</li>
<li>Reserve momentos específicos para planejamento, evitando permanecer em estado permanente de vigilância.</li>
<li>Pratique exercícios respiratórios e técnicas de atenção plena para diminuir a ativação fisiológica do organismo.</li>
<li>Mantenha rotina regular de sono, atividade física e alimentação, fatores diretamente relacionados à regulação emocional.</li>
<li>Reduza o consumo excessivo de notícias e informações alarmantes quando perceber aumento da ansiedade.</li>
<li>Escreva suas preocupações. Muitas vezes, colocá-las no papel permite perceber que diversos medos são repetitivos e pouco prováveis.</li>
</ul>

<p>Um exercício simples consiste em dividir uma folha em duas colunas.</p>

<ul>
<li>Na primeira coluna, escreva todas as preocupações que surgirem.</li>
<li>Na segunda, responda apenas duas perguntas:</li>
</ul>

<ul>
<li>Isso depende de mim?</li>
<li>Existe alguma ação concreta que posso realizar hoje?</li>
</ul>

<p>Se existir uma ação possível, transforme preocupação em planejamento.</p>

<p>Se não existir, talvez seja um convite para exercitar a aceitação da incerteza, algo fundamental na redução da ansiedade.</p>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia representa um dos recursos mais eficazes para compreender e tratar a preocupação excessiva associada ao TAG.</p>

<p>O processo terapêutico permite identificar padrões de pensamento automáticos, crenças desenvolvidas ao longo da vida e estratégias emocionais que, embora tenham surgido como tentativa de proteção, hoje mantêm o sofrimento.</p>

<p>Também oferece um espaço seguro para aprender novas formas de lidar com a incerteza, fortalecer a regulação emocional e reduzir a necessidade constante de antecipar catástrofes.</p>

<p>Para líderes, esse cuidado pode favorecer tomadas de decisão mais equilibradas, melhor qualidade de relacionamento com equipes e redução do desgaste provocado pela necessidade de controlar todos os resultados.</p>

<p>Para pessoas que buscam terapia, compreender esse funcionamento costuma representar um importante primeiro passo. Muitas descobrem que não são "pessimistas por natureza". Apenas desenvolveram um modo de funcionamento que pode ser compreendido, tratado e transformado.</p>

<h2>Conclusão</h2>

<p>Projetar o pior cenário nem sempre significa enxergar a realidade com mais clareza. Muitas vezes, significa apenas viver repetidamente sofrimentos que nunca acontecerão.</p>

<p>A mente ansiosa acredita que prever o perigo é uma forma de proteção. Entretanto, quando essa estratégia se torna permanente, ela deixa de proteger e passa a aprisionar.</p>

<p>Reconhecer esse padrão não significa eliminar todas as preocupações, mas aprender a diferenciar riscos reais de possibilidades imaginadas. Esse aprendizado permite recuperar energia, qualidade de vida e uma relação mais saudável com o futuro.</p>

<p>Conviver com alguma incerteza faz parte da experiência humana. Aprender que nem todo pensamento merece ser acreditado pode ser um dos caminhos mais importantes para reduzir a exaustão provocada pela ansiedade.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
