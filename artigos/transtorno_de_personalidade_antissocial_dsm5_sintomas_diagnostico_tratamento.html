    content: `



<p>Imagine um motorista que insiste em dirigir em alta velocidade por uma estrada cheia de curvas, ignorando placas de advertência, colocando a própria vida e a dos outros em risco. Mesmo após acidentes, multas e prejuízos, ele continua repetindo o mesmo comportamento. A estrada muda, os passageiros mudam, mas a forma de dirigir permanece praticamente igual. Essa metáfora ajuda a compreender o Transtorno de Personalidade Antissocial (TPAS): não se trata de um erro isolado de julgamento, mas de um padrão persistente de comportamento marcado pelo desrespeito aos direitos das outras pessoas e pelas consequências dos próprios atos.</p>

<p>O Transtorno de Personalidade Antissocial é descrito no <em>Manual Diagnóstico e Estatístico de Transtornos Mentais – DSM-5-TR</em> como um transtorno de personalidade pertencente ao Grupo B, caracterizado por comportamentos impulsivos, dramáticos e frequentemente marcados pela violação das normas sociais. Embora seja frequentemente associado a violência ou criminalidade na cultura popular, essa visão é simplificada e muitas vezes equivocada. Nem toda pessoa que comete um crime apresenta esse transtorno, assim como nem toda pessoa com esse diagnóstico manifesta comportamentos violentos.</p>

<p>Compreender esse transtorno exige separar mitos de evidências científicas. O diagnóstico depende de critérios específicos e deve ser realizado exclusivamente por profissionais habilitados após avaliação clínica cuidadosa.</p>

<h2>Explicação científica simplificada</h2>

<p>Segundo o DSM-5-TR, o Transtorno de Personalidade Antissocial caracteriza-se por um padrão persistente de desrespeito e violação dos direitos de outras pessoas, iniciado desde os 15 anos de idade e mantido na vida adulta.</p>

<p>Para que o diagnóstico seja estabelecido, a pessoa deve ter pelo menos 18 anos e apresentar histórico de Transtorno de Conduta antes dos 15 anos. Além disso, o comportamento não pode ocorrer exclusivamente durante episódios de esquizofrenia ou transtorno bipolar.</p>

<p>Entre as principais características diagnósticas descritas pelo DSM-5 estão:</p>

<ul>
<li>Desrespeito repetido às normas legais e sociais.</li>
<li>Enganar ou manipular outras pessoas para benefício próprio.</li>
<li>Impulsividade ou dificuldade para planejar.</li>
<li>Irritabilidade e agressividade frequentes.</li>
<li>Desconsideração pela própria segurança ou pela segurança dos outros.</li>
<li>Irresponsabilidade persistente em compromissos profissionais, financeiros ou familiares.</li>
<li>Ausência ou redução significativa de remorso após causar prejuízo a outras pessoas.</li>
</ul>

<p>Esses comportamentos precisam formar um padrão estável de funcionamento, produzindo prejuízo social, ocupacional ou interpessoal.</p>

<h2>Características associadas</h2>

<p>Além dos critérios diagnósticos, o DSM-5 descreve características frequentemente associadas ao transtorno.</p>

<p>Pessoas com Transtorno de Personalidade Antissocial podem apresentar baixa tolerância à frustração, tendência à impulsividade, dificuldade para aprender com experiências negativas e menor preocupação com as consequências de seus comportamentos.</p>

<p>Também podem ocorrer:</p>

<ul>
<li>Comportamentos manipulativos.</li>
<li>Dificuldade em manter relacionamentos duradouros.</li>
<li>Busca frequente por situações de risco.</li>
<li>Histórico de conflitos familiares e escolares.</li>
<li>Baixa capacidade de assumir responsabilidade pelos próprios atos.</li>
<li>Justificativas constantes para comportamentos prejudiciais.</li>
</ul>

<p>É importante destacar que essas características variam em intensidade entre diferentes indivíduos e não significam, isoladamente, que alguém possua o transtorno.</p>

<h2>Prevalência</h2>

<p>Segundo o DSM-5-TR, a prevalência do Transtorno de Personalidade Antissocial na população geral varia entre aproximadamente 0,2% e 3,3%, dependendo da população estudada e dos critérios utilizados.</p>

<p>O diagnóstico é significativamente mais frequente em homens do que em mulheres, embora fatores sociais, culturais e diferenças na procura por tratamento possam influenciar esses números.</p>

<p>A prevalência costuma ser maior em populações clínicas, instituições prisionais e ambientes com elevada incidência de transtornos relacionados ao uso de substâncias.</p>

<h2>Fatores de risco e prognóstico</h2>

<p>O DSM-5-TR descreve que o desenvolvimento do transtorno resulta da interação entre fatores biológicos, temperamentais e ambientais.</p>

<p>Entre os fatores associados a maior risco encontram-se:</p>

<ul>
<li>Histórico de Transtorno de Conduta na infância.</li>
<li>Impulsividade precoce.</li>
<li>Ambientes familiares marcados por negligência, violência ou instabilidade.</li>
<li>Exposição persistente a comportamentos antissociais durante o desenvolvimento.</li>
<li>Predisposição genética associada a fatores ambientais.</li>
</ul>

<p>Quanto ao prognóstico, alguns comportamentos antissociais tendem a diminuir com o avanço da idade, especialmente após a quarta década de vida. Entretanto, traços relacionados à manipulação, irresponsabilidade e dificuldades interpessoais podem permanecer presentes caso não haja tratamento.</p>

<h2>Desenvolvimento e curso</h2>

<p>O diagnóstico exige evidências de Transtorno de Conduta antes dos 15 anos de idade. Isso significa que sinais como agressividade persistente, destruição de propriedades, violações repetidas de regras e comportamentos enganosos costumam surgir ainda na infância ou adolescência.</p>

<p>Na vida adulta, esses padrões podem evoluir para dificuldades ocupacionais, conflitos conjugais, problemas legais e instabilidade financeira.</p>

<p>Embora o curso varie entre os indivíduos, intervenções precoces durante a infância e adolescência podem reduzir significativamente a gravidade de alguns comportamentos ao longo da vida.</p>

<h2>Diagnóstico diferencial</h2>

<p>O diagnóstico diferencial é fundamental, pois diferentes condições podem apresentar características semelhantes.</p>

<p>Entre os principais diagnósticos diferenciais descritos pelo DSM-5 estão:</p>

<ul>
<li><strong>Transtorno Bipolar:</strong> comportamentos impulsivos podem ocorrer durante episódios maníacos, mas são episódicos e não um padrão permanente de personalidade.</li>

<li><strong>Transtorno de Personalidade Narcisista:</strong> ambos podem envolver exploração interpessoal, porém no transtorno narcisista predominam grandiosidade e necessidade de admiração.</li>

<li><strong>Transtorno de Personalidade Borderline:</strong> ambos podem apresentar impulsividade, mas no Borderline predominam instabilidade emocional intensa e medo de abandono.</li>

<li><strong>Transtornos relacionados ao uso de substâncias:</strong> algumas alterações comportamentais podem decorrer diretamente do consumo de álcool ou outras drogas.</li>
</ul>

<p>Somente uma avaliação clínica abrangente permite estabelecer um diagnóstico confiável.</p>

<h2>Comorbidades</h2>

<p>O Transtorno de Personalidade Antissocial frequentemente ocorre associado a outros transtornos mentais.</p>

<p>Entre as principais comorbidades descritas pelo DSM-5 destacam-se:</p>

<ul>
<li>Transtornos relacionados ao uso de álcool e outras substâncias.</li>
<li>Transtorno de Déficit de Atenção/Hiperatividade (TDAH).</li>
<li>Transtornos depressivos.</li>
<li>Transtornos de ansiedade.</li>
<li>Outros transtornos de personalidade, especialmente Borderline e Narcisista.</li>
</ul>

<p>A presença dessas condições pode aumentar a complexidade clínica e influenciar o planejamento terapêutico.</p>

<h2>Questões diagnósticas relativas ao sexo e ao gênero</h2>

<p>Segundo o DSM-5-TR, o Transtorno de Personalidade Antissocial é diagnosticado com maior frequência em homens. Entretanto, diferenças culturais, expectativas sociais e formas distintas de manifestação podem influenciar esse resultado.</p>

<p>Mulheres podem apresentar padrões antissociais menos associados à agressão física e mais relacionados à manipulação interpessoal ou outras formas de violação de normas, o que pode dificultar o reconhecimento clínico em alguns contextos.</p>

<p>Por isso, a avaliação diagnóstica deve considerar o contexto sociocultural e evitar interpretações baseadas apenas em estereótipos relacionados ao sexo ou ao gênero.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, compreender o Transtorno de Personalidade Antissocial exige olhar além dos comportamentos visíveis. Embora algumas pessoas procurem atendimento espontaneamente, muitas chegam aos serviços de saúde por encaminhamento judicial, conflitos familiares ou problemas relacionados ao uso de substâncias.</p>

<p>O tratamento costuma ser desafiador porque frequentemente existe pouca percepção das próprias dificuldades ou baixa motivação para mudanças. Ainda assim, intervenções psicoterapêuticas podem contribuir para o desenvolvimento de maior responsabilidade, controle da impulsividade, habilidades sociais e redução de comportamentos de risco.</p>

<p>É importante lembrar que cada pessoa possui uma história única, e o diagnóstico nunca deve ser utilizado para definir integralmente sua identidade ou seu potencial de mudança.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Evite utilizar o termo "psicopata" para descrever qualquer pessoa com comportamento difícil.</li>
<li>Não realize autodiagnósticos baseados em vídeos ou conteúdos das redes sociais.</li>
<li>Procure avaliação profissional caso existam padrões persistentes de impulsividade, violação de normas e prejuízo significativo.</li>
<li>Familiares também podem se beneficiar de orientação psicológica para compreender melhor essas dinâmicas.</li>
<li>Intervenções precoces em crianças e adolescentes com problemas persistentes de conduta podem favorecer melhores resultados futuros.</li>
<li>O acompanhamento psicológico deve ser individualizado e baseado em avaliação clínica completa.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia pode desempenhar papel importante no manejo do Transtorno de Personalidade Antissocial, especialmente quando existe disposição para participar do tratamento. O processo terapêutico busca favorecer maior consciência das consequências dos próprios comportamentos, desenvolver estratégias de autorregulação emocional, ampliar habilidades interpessoais e fortalecer padrões mais adaptativos de funcionamento.</p>

<p>Embora mudanças costumem ocorrer de forma gradual, intervenções consistentes podem contribuir para melhorar a qualidade das relações interpessoais e reduzir comportamentos que geram prejuízos pessoais e sociais.</p>

<h2>Conclusão</h2>

<p>O Transtorno de Personalidade Antissocial é uma condição complexa que vai muito além dos estereótipos frequentemente divulgados na internet e nos meios de comunicação. Seu diagnóstico depende de critérios específicos estabelecidos pelo DSM-5-TR e exige avaliação clínica criteriosa.</p>

<p>Conhecer suas características, fatores de risco, desenvolvimento, diagnóstico diferencial e possibilidades de tratamento permite compreender o transtorno de forma mais científica e menos estigmatizada. Assim como um motorista pode aprender a conduzir com maior responsabilidade quando reconhece os riscos da estrada, pessoas que recebem acompanhamento adequado podem desenvolver formas mais saudáveis de lidar com seus comportamentos e relacionamentos.</p>

/*
  Aqui começam várias funções importantes para fazer a página funcionar.

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
