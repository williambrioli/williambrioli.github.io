    content: `



<p>Uma mulher procurou ajuda terapêutica meses após o fim de um relacionamento. Ela não conseguia dormir bem, chorava com frequência e sentia que sua vida havia perdido o sentido. Quando falava sobre o que estava acontecendo, repetia frases como: “Foi tudo culpa minha”, “Nunca mais vou encontrar alguém” e “Ninguém vai me amar de novo”. Embora o término fosse doloroso, o sofrimento parecia crescer ainda mais por causa da forma como ela interpretava a situação.</p>

<p>Com o passar das sessões, ela começou a perceber algo importante: os pensamentos que surgiam automaticamente em sua mente não eram necessariamente fatos. Eram interpretações. E muitas delas estavam carregadas de conclusões precipitadas, autocrítica excessiva e generalizações negativas.</p>

<p>Essa descoberta transformou sua maneira de lidar com a dor emocional. Aos poucos, ela aprendeu a questionar essas crenças, desenvolver interpretações mais equilibradas e recuperar sua autoestima. Essa mudança ilustra um dos princípios mais importantes da Terapia Cognitivo-Comportamental (TCC): mudar a forma como pensamos pode mudar significativamente a forma como nos sentimos.</p>

<h2>Explicação científica simplificada</h2>

<p>A Terapia Cognitivo-Comportamental (TCC) é uma abordagem psicológica desenvolvida pelo psiquiatra Aaron Beck e amplamente utilizada no tratamento da ansiedade, depressão, baixa autoestima, transtorno obsessivo-compulsivo (TOC), transtornos alimentares e diversas outras dificuldades emocionais.</p>

<p>Seu princípio fundamental é relativamente simples: pensamentos, emoções, sensações físicas e comportamentos estão interligados e influenciam-se continuamente.</p>

<p>Quando algo acontece em nossa vida, não reagimos diretamente ao acontecimento. Reagimos à interpretação que fazemos dele. Duas pessoas podem vivenciar exatamente a mesma situação e experimentar emoções completamente diferentes porque pensaram de maneiras diferentes sobre ela.</p>

<p>Imagine duas pessoas que recebem uma crítica no trabalho. Uma pensa: “Cometi um erro, mas posso aprender com isso.” A outra pensa: “Sou incompetente e vou fracassar.” Embora a situação seja a mesma, as emoções e os comportamentos resultantes serão muito diferentes.</p>

<p>Segundo a TCC, muitos sofrimentos emocionais são intensificados por aquilo que chamamos de distorções cognitivas. Essas distorções são formas automáticas e frequentemente imprecisas de interpretar a realidade.</p>

<p>Entre as distorções cognitivas mais comuns estão:</p>

<ul>
<li>Catastrofização: imaginar sempre o pior cenário possível.</li>
<li>Generalização excessiva: acreditar que um acontecimento negativo define toda a vida.</li>
<li>Leitura mental: presumir saber o que os outros pensam.</li>
<li>Personalização: assumir responsabilidade excessiva por situações complexas.</li>
<li>Pensamento tudo ou nada: enxergar as situações apenas em extremos.</li>
</ul>

<p>Quando esses padrões se repetem diariamente, acabam influenciando diretamente nosso humor, nossa autoestima e nossa forma de agir.</p>

<p>Uma metáfora útil é imaginar que nossos pensamentos funcionam como lentes de um óculos. Quando as lentes estão limpas, enxergamos a realidade com mais clareza. Quando estão embaçadas por crenças negativas, interpretações distorcidas ou experiências dolorosas, nossa visão da realidade também fica comprometida.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, é muito comum observar pessoas presas em ciclos de sofrimento alimentados por pensamentos automáticos negativos. Muitas vezes elas acreditam que estão reagindo aos fatos, quando na verdade estão reagindo às interpretações que fizeram desses fatos.</p>

<p>Esse fenômeno costuma ser particularmente intenso em pessoas que passaram por relacionamentos abusivos ou conviveram com indivíduos narcisistas. Após anos ouvindo críticas, desvalorizações e manipulações emocionais, muitas acabam internalizando crenças negativas sobre si mesmas.</p>

<p>Frases como “Não sou suficiente”, “Sempre estrago tudo”, “Ninguém vai me amar” ou “Preciso agradar para ser aceito” passam a funcionar como verdades absolutas, mesmo quando não existem evidências objetivas para sustentá-las.</p>

<p>O livro <em>Como se Libertar de um Narcisista</em>, da Dra. Sarah Davies, descreve como experiências de abuso emocional podem afetar profundamente a autoestima e a percepção de valor pessoal. Muitas vítimas passam a enxergar a si mesmas através das críticas recebidas, desenvolvendo crenças distorcidas sobre quem são.</p>

<p>Além disso, quando uma pessoa está ansiosa ou deprimida, seu cérebro tende naturalmente a focar mais nos aspectos negativos da realidade. Esse viés cognitivo funciona como um filtro seletivo que destaca problemas, ameaças e fracassos, enquanto minimiza conquistas, qualidades e possibilidades positivas.</p>

<p>Por isso, aprender a reconhecer e desafiar pensamentos automáticos não significa adotar um pensamento fantasioso ou excessivamente otimista. Significa desenvolver uma visão mais equilibrada, realista e funcional da realidade.</p>

<h2>Aplicações práticas e orientações</h2>

<p>Uma das ferramentas mais utilizadas na TCC consiste em dividir uma situação em cinco áreas principais:</p>

<ul>
<li>Situação</li>
<li>Pensamentos</li>
<li>Emoções</li>
<li>Sensações físicas</li>
<li>Comportamentos</li>
</ul>

<p>Vamos utilizar o exemplo do término de um relacionamento.</p>

<ul>
<li><strong>Situação:</strong> o relacionamento terminou.</li>
<li><strong>Pensamentos:</strong> “Fracassei”, “Foi minha culpa”, “Nunca encontrarei alguém”.</li>
<li><strong>Emoções:</strong> tristeza, culpa, desesperança.</li>
<li><strong>Sensações físicas:</strong> cansaço, peso no corpo, falta de energia.</li>
<li><strong>Comportamentos:</strong> isolamento social, abandono de atividades prazerosas, alimentação desregulada.</li>
</ul>

<p>Observe como cada elemento alimenta o outro, formando um ciclo.</p>

<p>Agora imagine interromper esse ciclo justamente no ponto dos pensamentos.</p>

<p>Ao identificar uma ideia negativa, faça as seguintes perguntas:</p>

<ul>
<li>Isso é realmente verdade?</li>
<li>Existe alguma evidência concreta para essa conclusão?</li>
<li>Estou ignorando informações importantes?</li>
<li>O que eu diria a um amigo que estivesse pensando assim?</li>
<li>Existe uma forma mais equilibrada de interpretar essa situação?</li>
</ul>

<p>Por exemplo:</p>

<p>Em vez de pensar: “Nunca mais vou encontrar alguém”, você poderia considerar: “Estou sofrendo neste momento, mas outras oportunidades poderão surgir no futuro.”</p>

<p>Em vez de pensar: “Foi tudo culpa minha”, poderia refletir: “Relacionamentos envolvem duas pessoas e diversos fatores.”</p>

<p>Em vez de pensar: “Ninguém vai me querer”, poderia reconhecer: “Estou magoado agora, mas isso não define meu valor como pessoa.”</p>

<p>Essas mudanças podem parecer simples, mas possuem um impacto significativo sobre o estado emocional.</p>

<p>Outro exercício extremamente útil consiste em manter um diário de pensamentos.</p>

<p>Durante alguns minutos por dia, registre:</p>

<ul>
<li>O que aconteceu.</li>
<li>O que você pensou.</li>
<li>Como se sentiu.</li>
<li>Qual pensamento alternativo seria mais equilibrado.</li>
<li>Como se sente após essa nova interpretação.</li>
</ul>

<p>Esse exercício ajuda a tornar conscientes padrões que normalmente acontecem de forma automática.</p>

<p>A prática de atenção plena (mindfulness) também pode ser uma grande aliada. Quando aprendemos a observar nossos pensamentos sem acreditar imediatamente em tudo que eles dizem, desenvolvemos maior liberdade emocional.</p>

<p>A mente produz pensamentos da mesma forma que o coração bombeia sangue. Nem todo pensamento precisa ser aceito como verdade.</p>

<h2>Pontes para psicoterapia</h2>

<p>Muitas pessoas conseguem identificar pensamentos negativos após lerem sobre o assunto. Entretanto, modificar padrões profundamente enraizados costuma ser um desafio maior.</p>

<p>Algumas crenças foram construídas ao longo de anos ou até décadas. Elas podem ter origem na infância, em experiências traumáticas, relacionamentos abusivos, rejeições significativas ou ambientes familiares excessivamente críticos.</p>

<p>Por isso, a psicoterapia oferece algo que vai além da simples identificação de pensamentos negativos. Ela possibilita compreender a origem desses padrões, trabalhar emoções associadas e construir novas formas de relacionamento consigo mesmo.</p>

<p>A TCC fornece ferramentas estruturadas para identificar e modificar distorções cognitivas. Já abordagens psicodinâmicas e psicanalíticas podem auxiliar na compreensão mais profunda das raízes emocionais desses padrões.</p>

<p>Independentemente da abordagem utilizada, o processo terapêutico ajuda a desenvolver autoconhecimento, fortalecer a autoestima e construir uma relação mais saudável consigo mesmo.</p>

<p>Quando uma pessoa aprende a reconhecer seus pensamentos automáticos e questioná-los de maneira consciente, ela deixa de ser refém deles. Passa a ocupar uma posição mais ativa diante da própria vida emocional.</p>

<h2>Conclusão</h2>

<p>A forma como pensamos influencia profundamente a maneira como sentimos e agimos. Muitas vezes, não são os acontecimentos em si que geram sofrimento intenso, mas as interpretações que construímos sobre eles.</p>

<p>Aprender a identificar pensamentos automáticos, questionar distorções cognitivas e desenvolver interpretações mais equilibradas é uma habilidade que pode ser aprendida e fortalecida com a prática.</p>

<p>Assim como alguém que fuma durante muitos anos precisa de tempo para abandonar o hábito, padrões de pensamento também exigem paciência, persistência e treinamento para serem transformados.</p>

<p>A boa notícia é que pensamentos não são fatos. Eles podem ser observados, analisados, questionados e modificados. Quando mudamos as lentes através das quais enxergamos a realidade, frequentemente mudamos também a forma como nos sentimos, as escolhas que fazemos e a qualidade da nossa vida emocional.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);

   ========================================== */

  document.title = ARTICLE.title + " | William Brioli";

  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
