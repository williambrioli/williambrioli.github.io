    content: `



<p>Imagine conhecer alguém que, à primeira vista, transmite segurança, carisma e uma confiança quase inabalável. Com o passar do tempo, porém, os relacionamentos tornam-se difíceis. Críticas são recebidas como ataques pessoais, a necessidade constante de admiração parece nunca ser suficiente e a empatia diante do sofrimento alheio parece limitada. Muitas pessoas convivem com indivíduos que apresentam esses padrões e acabam se perguntando: isso é apenas vaidade, ego elevado ou existe um transtorno psicológico?</p>

<p>O Transtorno de Personalidade Narcisista (TPN) é um dos transtornos de personalidade descritos no <em>Manual Diagnóstico e Estatístico de Transtornos Mentais – DSM-5-TR</em>. Entretanto, é importante compreender que nem toda pessoa considerada "narcisista" apresenta esse transtorno. Existe uma diferença significativa entre possuir alguns traços de personalidade narcisistas e preencher critérios diagnósticos para um transtorno de personalidade.</p>

<p>Assim como um espelho pode refletir apenas a superfície de uma pessoa sem revelar sua história, seus medos ou suas fragilidades, o transtorno de personalidade narcisista frequentemente apresenta uma imagem externa de grandiosidade que esconde uma autoestima extremamente vulnerável. Compreender essa diferença é fundamental para reduzir preconceitos e favorecer intervenções terapêuticas mais eficazes.</p>

<h2>Explicação científica simplificada</h2>

<p>O Transtorno de Personalidade Narcisista pertence ao grupo B dos transtornos de personalidade no DSM-5-TR, grupo caracterizado por padrões persistentes de comportamento considerados dramáticos, emocionais ou imprevisíveis.</p>

<p>Segundo o DSM-5-TR, o transtorno caracteriza-se por um padrão persistente de grandiosidade, necessidade excessiva de admiração e déficit significativo de empatia, presente em diversos contextos da vida e iniciado no começo da vida adulta.</p>

<p>O diagnóstico exige a presença de critérios específicos que incluem:</p>

<ul>
<li>Sentimento exagerado da própria importância.</li>
<li>Fantasias recorrentes de sucesso ilimitado, poder, beleza ou inteligência.</li>
<li>Crença de ser especial e de só poder ser compreendido por pessoas igualmente especiais.</li>
<li>Necessidade intensa de admiração.</li>
<li>Expectativa de tratamento privilegiado.</li>
<li>Tendência à exploração interpessoal.</li>
<li>Dificuldade significativa em reconhecer ou compreender os sentimentos das outras pessoas.</li>
<li>Inveja frequente ou crença de ser alvo da inveja alheia.</li>
<li>Comportamentos ou atitudes arrogantes.</li>
</ul>

<p>Esses comportamentos precisam ser persistentes, causar prejuízo significativo nas relações pessoais, profissionais ou sociais e não podem ser explicados melhor por outro transtorno mental, uso de substâncias ou condição médica.</p>

<h2>Características associadas ao transtorno</h2>

<p>Além dos critérios diagnósticos formais, o DSM-5 descreve diversas características frequentemente associadas ao transtorno.</p>

<p>Pessoas com Transtorno de Personalidade Narcisista costumam apresentar autoestima extremamente instável, apesar da aparência de autoconfiança. Pequenas críticas podem provocar intensa irritação, vergonha, humilhação ou sentimentos profundos de fracasso.</p>

<p>Muitas vezes existe uma oscilação entre sentimentos de superioridade e períodos de intenso vazio emocional. Quando deixam de receber reconhecimento, podem desenvolver reações de raiva intensa, ressentimento ou isolamento.</p>

<p>Também podem apresentar:</p>

<ul>
<li>Hipersensibilidade à crítica.</li>
<li>Dificuldade em aceitar erros.</li>
<li>Necessidade constante de validação externa.</li>
<li>Relacionamentos superficiais ou instáveis.</li>
<li>Dificuldade em estabelecer vínculos recíprocos.</li>
<li>Competitividade excessiva.</li>
<li>Tendência ao perfeccionismo quando isso reforça sua imagem.</li>
</ul>

<p>É importante destacar que essas manifestações podem variar bastante de intensidade entre diferentes indivíduos.</p>

<h2>Prevalência</h2>

<p>O DSM-5 informa que a prevalência estimada do Transtorno de Personalidade Narcisista na população geral varia entre aproximadamente 0% e 6,2%, dependendo dos estudos e dos critérios utilizados.</p>

<p>O transtorno parece ser diagnosticado com maior frequência em homens do que em mulheres, embora diferenças culturais, sociais e metodológicas possam influenciar essas estimativas.</p>

<p>Vale lembrar que possuir traços narcisistas não significa necessariamente apresentar o transtorno. Muitas pessoas demonstram comportamentos narcisistas em determinadas fases da vida ou em situações específicas sem preencher os critérios clínicos.</p>

<h2>Desenvolvimento e curso</h2>

<p>Os transtornos de personalidade costumam começar a se tornar mais evidentes no final da adolescência ou no início da vida adulta.</p>

<p>No caso do Transtorno de Personalidade Narcisista, fatores biológicos, temperamentais e ambientais parecem contribuir para seu desenvolvimento. Não existe uma causa única conhecida.</p>

<p>Pesquisas sugerem que experiências precoces de desenvolvimento, estilos parentais inconsistentes, excesso de idealização ou, em alguns casos, críticas extremamente severas podem participar da formação desse padrão de funcionamento psicológico. Entretanto, nenhuma dessas experiências, isoladamente, explica o transtorno.</p>

<p>Ao longo da vida, alguns aspectos podem sofrer modificações. Com o envelhecimento, certas manifestações de grandiosidade tendem a diminuir, enquanto dificuldades interpessoais podem permanecer presentes caso não haja tratamento adequado.</p>

<h2>Diagnóstico diferencial</h2>

<p>Realizar um diagnóstico adequado exige avaliação clínica cuidadosa. Diversos transtornos podem apresentar características semelhantes.</p>

<p>Entre os principais diagnósticos diferenciais descritos pelo DSM-5 estão:</p>

<ul>
<li><strong>Transtorno Bipolar:</strong> episódios de mania podem apresentar grandiosidade, mas ocorrem de forma episódica.</li>

<li><strong>Transtorno de Personalidade Borderline:</strong> ambos podem apresentar instabilidade interpessoal, porém o Borderline caracteriza-se principalmente por medo intenso de abandono, impulsividade e instabilidade emocional.</li>

<li><strong>Transtorno de Personalidade Antissocial:</strong> ambos podem explorar outras pessoas, mas o transtorno antissocial envolve violação persistente dos direitos alheios, impulsividade e comportamento criminoso mais frequente.</li>

<li><strong>Transtorno Histriônico da Personalidade:</strong> ambos buscam atenção, porém o histriônico geralmente utiliza expressividade emocional exagerada, enquanto o narcisista busca admiração relacionada ao próprio valor.</li>

<li><strong>Traços narcisistas sem transtorno:</strong> pessoas confiantes, competitivas ou ambiciosas não necessariamente possuem um transtorno de personalidade.</li>
</ul>

<p>Somente um profissional habilitado pode estabelecer esse diagnóstico após avaliação clínica detalhada.</p>

<h2>Comorbidades</h2>

<p>O Transtorno de Personalidade Narcisista frequentemente ocorre associado a outros transtornos mentais.</p>

<p>Entre as comorbidades descritas pelo DSM-5 destacam-se:</p>

<ul>
<li>Transtornos depressivos.</li>
<li>Transtornos de ansiedade.</li>
<li>Transtornos relacionados ao uso de álcool e outras substâncias.</li>
<li>Outros transtornos de personalidade, especialmente Borderline, Antissocial, Histriônico e Paranoide.</li>
<li>Transtornos alimentares em alguns casos.</li>
</ul>

<p>A presença dessas condições pode aumentar o sofrimento psicológico e tornar o tratamento mais complexo, exigindo avaliação individualizada.</p>

<h2>Associação com pensamentos ou comportamentos suicidas</h2>

<p>Embora o Transtorno de Personalidade Narcisista seja frequentemente associado à grandiosidade, isso não significa que a pessoa esteja protegida contra sofrimento intenso.</p>

<p>Segundo o DSM-5-TR, indivíduos com esse transtorno podem apresentar pensamentos suicidas, comportamento suicida ou episódios de automutilação, especialmente quando enfrentam situações que produzem intenso sentimento de fracasso, humilhação, rejeição, perda de status, rompimentos afetivos ou críticas severas.</p>

<p>Esses eventos podem provocar aquilo que alguns autores descrevem como "ferida narcísica", uma experiência de intenso abalo da autoestima que pode desencadear sofrimento psicológico importante.</p>

<p>Isso reforça a importância de nunca minimizar sinais de sofrimento emocional em pessoas com esse transtorno. Toda manifestação relacionada à desesperança, ideação suicida ou risco deve ser avaliada imediatamente por profissionais qualificados.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, compreender o funcionamento do Transtorno de Personalidade Narcisista exige ir além da aparência de autoconfiança. Muitas vezes, comportamentos considerados arrogantes funcionam como estratégias psicológicas para proteger uma autoestima extremamente frágil.</p>

<p>Isso não significa justificar atitudes prejudiciais nem minimizar seus impactos sobre familiares, parceiros ou colegas de trabalho. Ao contrário, compreender o funcionamento psicológico permite construir intervenções mais eficazes e favorecer relações mais saudáveis.</p>

<p>O tratamento costuma envolver o desenvolvimento gradual da capacidade de reconhecer emoções, fortalecer uma autoestima menos dependente da validação externa, ampliar a empatia e desenvolver formas mais flexíveis de lidar com frustrações.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Evite realizar autodiagnósticos baseados apenas em vídeos ou redes sociais.</li>
<li>Lembre-se de que possuir traços narcisistas não significa apresentar um transtorno.</li>
<li>Observe se os padrões causam sofrimento significativo ou prejuízo persistente nos relacionamentos.</li>
<li>Busque avaliação profissional quando houver dificuldades recorrentes nas relações interpessoais.</li>
<li>Familiares também podem se beneficiar de orientação psicológica para compreender melhor essas dinâmicas.</li>
<li>O tratamento costuma produzir melhores resultados quando existe vínculo terapêutico consistente e continuidade do acompanhamento.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia representa um dos principais recursos para o acompanhamento do Transtorno de Personalidade Narcisista. O processo terapêutico busca favorecer maior consciência sobre padrões de funcionamento, ampliar a capacidade de autorreflexão, desenvolver habilidades emocionais e construir formas mais saudáveis de relacionamento.</p>

<p>Além disso, pessoas que convivem com indivíduos que apresentam esse padrão também podem encontrar na psicoterapia um espaço seguro para compreender seus próprios limites, fortalecer sua autoestima e desenvolver estratégias mais equilibradas para lidar com relações complexas.</p>

<h2>Conclusão</h2>

<p>O Transtorno de Personalidade Narcisista é muito mais complexo do que a imagem popular frequentemente divulgada nas redes sociais. Trata-se de um transtorno psicológico definido por critérios diagnósticos específicos, que envolve padrões persistentes de grandiosidade, necessidade de admiração e dificuldades importantes na empatia e nos relacionamentos.</p>

<p>Conhecer essas características ajuda a combater estigmas, evita diagnósticos precipitados e favorece uma compreensão mais humana da saúde mental. Assim como um espelho pode mostrar apenas a superfície, compreender uma pessoa exige olhar além da imagem refletida e reconhecer a complexidade de sua história, de suas vulnerabilidades e de suas possibilidades de mudança.</p>

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}

  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
