    content: `


<p>Imagine alguém que parece iluminar qualquer ambiente em que entra. Fala com entusiasmo, sorri com facilidade, conta histórias marcantes e desperta a atenção das pessoas quase instantaneamente. À primeira vista, essa característica pode parecer apenas uma personalidade extrovertida e carismática. No entanto, para algumas pessoas, a necessidade constante de ser percebida, admirada e validada deixa de ser apenas um traço de personalidade e passa a provocar sofrimento significativo, conflitos nos relacionamentos e prejuízos importantes na vida pessoal, afetiva e profissional. É nesse contexto que surge o Transtorno de Personalidade Histriônica, uma condição descrita pelo DSM-5-TR que vai muito além da ideia equivocada de alguém "dramático" ou "teatral". Compreender esse transtorno é um passo importante para substituir julgamentos por conhecimento e abrir espaço para intervenções terapêuticas capazes de promover mudanças reais.</p>

<h2>Explicação científica simplificada</h2>

<p>O Transtorno de Personalidade Histriônica (TPH) pertence ao Grupo B dos transtornos de personalidade no DSM-5-TR, juntamente com os transtornos antissocial, borderline e narcisista. Os transtornos desse grupo costumam apresentar padrões marcantes de emotividade intensa, impulsividade ou comportamentos considerados dramáticos.</p>

<p>Segundo o DSM-5-TR, o TPH caracteriza-se por um padrão persistente de emocionalidade excessiva e busca constante por atenção, iniciando no começo da vida adulta e presente em diferentes contextos da vida.</p>

<p>O diagnóstico clínico considera um conjunto de características, entre elas:</p>

<ul>
<li>Desconforto quando a pessoa não é o centro das atenções.</li>
<li>Interações marcadas por comportamento sedutor ou provocativo inadequado ao contexto.</li>
<li>Expressão emocional superficial ou que muda rapidamente.</li>
<li>Uso frequente da aparência física como forma de chamar atenção.</li>
<li>Forma de falar excessivamente impressionista, porém com poucos detalhes concretos.</li>
<li>Expressão dramática e teatral das emoções.</li>
<li>Facilidade para ser influenciada por outras pessoas ou pelas circunstâncias.</li>
<li>Tendência a perceber relacionamentos como mais íntimos do que realmente são.</li>
</ul>

<p>É importante compreender que esses comportamentos não acontecem de forma isolada nem representam simplesmente um jeito expansivo de ser. O diagnóstico depende da persistência desse padrão ao longo dos anos, do impacto funcional e do sofrimento gerado.</p>

<p>Uma metáfora ajuda a compreender esse funcionamento psicológico. Imagine um palco iluminado por refletores. Para a maioria das pessoas, sair do centro do palco em alguns momentos não representa um problema. Já para quem apresenta o Transtorno de Personalidade Histriônica, permanecer longe dos refletores pode gerar intensa sensação de vazio, insegurança ou perda de valor pessoal. A busca pela atenção torna-se uma tentativa constante de manter acesa uma luz que parece sustentar sua própria identidade.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Embora o diagnóstico seja definido por critérios objetivos, compreender sua origem exige uma visão mais ampla. Diversos estudos indicam que os transtornos de personalidade resultam da interação entre fatores biológicos, temperamentais, familiares, ambientais e experiências precoces de desenvolvimento.</p>

<p>Pessoas com TPH frequentemente apresentam intensa necessidade de aprovação social. O reconhecimento externo pode assumir um papel central na construção da autoestima, fazendo com que elogios, demonstrações de interesse ou atenção funcionem como reguladores emocionais.</p>

<p>Na prática clínica, é comum observar dificuldade em tolerar frustrações, rejeições ou situações em que outras pessoas recebem maior destaque. Pequenos episódios podem ser vivenciados como grandes perdas afetivas, levando a reações emocionais intensas.</p>

<p>Outra característica frequentemente observada é a tendência de interpretar relações sociais como mais próximas do que realmente são. Isso pode favorecer expectativas irreais, decepções recorrentes e dificuldades para estabelecer limites saudáveis.</p>

<p>Também é relativamente comum que decisões importantes sejam influenciadas pelas opiniões de pessoas consideradas significativas. Em vez de desenvolver um senso interno consistente sobre quem é e o que deseja, a identidade pode oscilar conforme o ambiente ou os vínculos estabelecidos.</p>

<p>Vale destacar que pessoas com esse transtorno costumam possuir habilidades sociais importantes. Muitas são comunicativas, criativas, espontâneas e demonstram facilidade para estabelecer contatos. Essas qualidades não desaparecem com o diagnóstico. O desafio está no fato de que tais recursos acabam frequentemente direcionados para suprir necessidades emocionais profundas relacionadas à validação e ao reconhecimento.</p>

<h2>Características associadas</h2>

<p>Além dos critérios diagnósticos, o DSM-5-TR descreve diversas características frequentemente associadas ao Transtorno de Personalidade Histriônica.</p>

<p>Essas pessoas podem apresentar baixa tolerância ao adiamento de gratificações, necessidade constante de novidades, tendência ao tédio e dificuldade para manter interesse prolongado em atividades rotineiras.</p>

<p>As emoções costumam ser intensas, porém muitas vezes rapidamente modificadas conforme as circunstâncias. Não significa que sejam falsas; frequentemente são genuínas, embora apresentem grande variabilidade e intensidade.</p>

<p>Nos relacionamentos afetivos, pode existir necessidade elevada de confirmação constante de amor, interesse ou admiração. Pequenos sinais de afastamento podem gerar ansiedade significativa.</p>

<p>Também pode haver maior vulnerabilidade à influência social, publicidade, opiniões de grupos e figuras de autoridade, especialmente quando essas influências oferecem sensação de pertencimento ou reconhecimento.</p>

<h2>Diagnóstico diferencial</h2>

<p>O diagnóstico diferencial é uma das etapas mais importantes da avaliação psicológica e psiquiátrica. Diversas condições podem apresentar características semelhantes, mas possuem funcionamento psicológico distinto.</p>

<p><strong>Transtorno de Personalidade Borderline:</strong> ambos podem apresentar intensidade emocional e dificuldades nos relacionamentos. Entretanto, no borderline predominam instabilidade da identidade, impulsividade importante, medo intenso de abandono e maior risco de comportamentos autolesivos.</p>

<p><strong>Transtorno de Personalidade Narcisista:</strong> ambos podem buscar admiração. Contudo, no transtorno narcisista predominam sentimentos de grandiosidade, necessidade de superioridade e menor sensibilidade empática, enquanto no TPH a necessidade principal costuma ser manter a atenção e o vínculo interpessoal.</p>

<p><strong>Transtorno de Personalidade Dependente:</strong> ambos podem buscar aprovação. No entanto, a personalidade dependente caracteriza-se principalmente pela necessidade de cuidados, submissão e medo de separação, enquanto o TPH enfatiza a busca pela atenção e expressividade emocional.</p>

<p><strong>Transtorno de Personalidade Borderline e Bipolaridade:</strong> oscilações emocionais podem gerar confusão diagnóstica. Porém, no transtorno bipolar existem episódios bem definidos de alteração do humor, enquanto no TPH a expressividade emocional constitui um padrão relativamente estável de personalidade.</p>

<p><strong>Traços de personalidade sem transtorno:</strong> pessoas extrovertidas, comunicativas ou emocionalmente expressivas não necessariamente apresentam qualquer transtorno. O diagnóstico depende sempre do prejuízo funcional, persistência e contexto clínico.</p>

<h2>Comorbidades</h2>

<p>O Transtorno de Personalidade Histriônica frequentemente ocorre associado a outros transtornos mentais. Essas associações são chamadas de comorbidades.</p>

<p>Entre as mais frequentemente descritas estão:</p>

<ul>
<li>Transtornos depressivos.</li>
<li>Transtornos de ansiedade.</li>
<li>Outros transtornos de personalidade, especialmente borderline, narcisista e dependente.</li>
<li>Transtornos relacionados ao uso de substâncias em alguns casos.</li>
<li>Transtornos de sintomas somáticos em determinados pacientes.</li>
</ul>

<p>A presença de comorbidades torna a avaliação clínica ainda mais importante, pois o tratamento precisa considerar todo o funcionamento psicológico da pessoa, e não apenas um diagnóstico isolado.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Evite utilizar rótulos como "dramático", "carente" ou "manipulador" para explicar comportamentos complexos.</li>
<li>Lembre-se de que somente profissionais habilitados podem realizar diagnóstico.</li>
<li>Procure observar padrões de funcionamento ao longo da vida, e não apenas episódios isolados.</li>
<li>Fortalecer autoestima baseada em competências pessoais reduz a dependência de validação externa.</li>
<li>Aprender estratégias de regulação emocional favorece relações mais saudáveis.</li>
<li>Desenvolver autoconhecimento ajuda a diferenciar necessidades emocionais de expectativas irreais.</li>
<li>Construir limites saudáveis melhora significativamente a qualidade dos relacionamentos.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia representa uma das principais formas de cuidado para pessoas com Transtorno de Personalidade Histriônica. O objetivo não é modificar quem a pessoa é, mas ajudá-la a compreender padrões emocionais que produzem sofrimento.</p>

<p>Ao longo do processo terapêutico, podem ser trabalhados aspectos como autoestima, construção de identidade, regulação emocional, reconhecimento de necessidades afetivas, desenvolvimento de relacionamentos mais seguros e fortalecimento da autonomia.</p>

<p>Sob uma perspectiva psicodinâmica e psicanalítica, a terapia também busca compreender como experiências precoces, vínculos importantes e formas de validação emocional influenciaram a maneira como a pessoa passou a se relacionar consigo mesma e com os outros. Essa compreensão amplia a possibilidade de mudanças consistentes, respeitando a singularidade de cada indivíduo.</p>

<h2>Conclusão</h2>

<p>O Transtorno de Personalidade Histriônica não pode ser reduzido à ideia de alguém exagerado, teatral ou que gosta de chamar atenção. Trata-se de um padrão complexo de funcionamento psicológico descrito cientificamente pelo DSM-5-TR, envolvendo necessidades profundas de reconhecimento, dificuldades na regulação emocional e formas específicas de relacionamento interpessoal.</p>

<p>Conhecer suas características diagnósticas, compreender seus diagnósticos diferenciais e reconhecer suas possíveis comorbidades contribui para reduzir preconceitos e favorecer intervenções mais eficazes. Quando existe sofrimento significativo, buscar avaliação profissional é um passo importante para desenvolver maior equilíbrio emocional, fortalecer a identidade e construir relações mais saudáveis.</p>

/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
