    content: `


Imagine duas pessoas com o mesmo conhecimento técnico, a mesma oportunidade e os mesmos recursos. Uma avança, cresce, lidera e prospera. A outra trava, procrastina e se limita. O que muda? Na maioria das vezes, não é capacidade — é crença. É a forma como cada uma interpreta quem é, o que pode e o que merece. No capítulo 4 do livro “Poder Sem Limites”, Tony Robbins aprofunda exatamente esse ponto: a excelência nasce das crenças que construímos ao longo da vida. E essas crenças não surgem do nada — elas são formadas por caminhos específicos que moldam nossa percepção da realidade. Entender isso é, na prática, entender como reprogramar sua própria vida.</p>

<h2>Explicação científica simplificada</h2>
<p>As crenças podem ser entendidas, dentro da psicologia cognitiva, como interpretações internalizadas da realidade. Elas funcionam como “filtros mentais” que influenciam percepção, emoção e comportamento. Segundo a Terapia Cognitivo-Comportamental (TCC), proposta por Aaron Beck, nossos pensamentos automáticos são baseados em crenças centrais — ideias profundas sobre quem somos, sobre os outros e sobre o mundo.</p>

<p>Tony Robbins organiza essas construções em quatro principais fontes, que dialogam com conceitos científicos já estabelecidos:</p>

<ul>
  <li><strong>Ambiente:</strong> A teoria da aprendizagem social, de Albert Bandura, mostra que aprendemos observando o comportamento dos outros. Pais, professores e líderes influenciam diretamente nossas crenças.</li>
  <li><strong>Acontecimentos:</strong> Experiências marcantes geram associações emocionais. A neurociência mostra que eventos com forte carga emocional fortalecem conexões neurais, consolidando crenças.</li>
  <li><strong>Resultados anteriores:</strong> O conceito de autoeficácia, também de Bandura, demonstra que nossos sucessos e fracassos moldam nossa percepção de capacidade.</li>
  <li><strong>Criação pela mente (interpretação do presente):</strong> A mente humana interpreta constantemente a realidade. Segundo a psicologia cognitiva, não reagimos aos fatos em si, mas à interpretação que fazemos deles.</li>
</ul>

<p>Ou seja, as crenças não são verdades absolutas — são construções mentais baseadas em experiências e interpretações. Isso significa que podem ser modificadas.</p>

<h2>Análise profissional aplicada ao tema</h2>
<p>No contexto corporativo e de desenvolvimento humano, compreender a origem das crenças é um divisor de águas. Líderes, gestores de RH e empreendedores frequentemente enfrentam um problema invisível: profissionais tecnicamente capacitados, mas emocionalmente limitados por crenças internas.</p>

<p>Um líder que acredita “eu não sou bom em lidar com pessoas” tende a evitar conflitos, dificultando a gestão. Um vendedor que acredita “cliente sempre quer preço baixo” enfraquece sua argumentação. Um empreendedor que acredita “não sou capaz de crescer” limita suas próprias decisões estratégicas.</p>

<p>Essas crenças não são falta de competência — são programações mentais.</p>

<p>Na prática, isso impacta diretamente:</p>

</ul>

<p>Do ponto de vista clínico, muitas dessas crenças têm origem na infância ou em experiências repetidas ao longo da vida. Já no ambiente organizacional, elas são reforçadas por cultura, feedbacks e resultados acumulados.</p>

<p>Uma metáfora simples ajuda a entender: crenças são como lentes. Não mudam a realidade — mas mudam completamente a forma como você enxerga e reage a ela.</p>

<h2>Aplicações práticas e orientações</h2>
<p>Se crenças são construídas, elas também podem ser reconstruídas. Abaixo estão orientações práticas para identificar e transformar crenças limitantes:</p>

<ul>
  <li><strong>Mapeie suas crenças atuais:</strong> Pergunte-se: “O que eu acredito sobre mim mesmo?”</li>
  <li><strong>Identifique a origem:</strong> Essa crença veio de quem? De qual experiência?</li>

  <li><strong>Substitua por crenças fortalecedoras:</strong> Crie novas interpretações mais funcionais.</li>
  <li><strong>Reforce com ação:</strong> Novas crenças se consolidam através de novos comportamentos.</li>
</ul>

<p><strong>Atividade prática (autoaplicável):</strong></p>

<ul>

<p>Essa mudança não é apenas motivacional — é estratégica. Ela altera comportamento, postura e resultados.</p>

<h2>Pontes para psicoterapia</h2>
<p>No contexto terapêutico, o trabalho com crenças é central. Abordagens como a Terapia Cognitivo-Comportamental, a Psicologia Humanista e até mesmo linhas integrativas utilizam técnicas para identificar e ressignificar crenças limitantes.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
