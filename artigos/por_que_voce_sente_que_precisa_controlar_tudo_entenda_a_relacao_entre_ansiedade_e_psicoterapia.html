    content: `


<p>Imagine uma pessoa que revisa várias vezes se a porta foi trancada, confere repetidamente mensagens antes de enviá-las e sente desconforto quando algo acontece fora do planejado. Ela costuma ouvir que é apenas "perfeccionista" ou "organizada", mas, por dentro, vive um desgaste constante. O desejo de controlar tudo parece oferecer segurança, porém, quanto mais tenta controlar cada detalhe, maior se torna a ansiedade. É como tentar segurar água entre os dedos: quanto mais força se faz, mais ela escapa.</p>

<p>Esse padrão é mais comum do que parece. Em muitos casos, a necessidade constante de controle não nasce de um excesso de organização, mas de uma tentativa inconsciente de evitar sofrimento, frustrações, perdas ou situações imprevisíveis. Compreender esse mecanismo é um passo importante para desenvolver uma relação mais saudável consigo mesmo e com a própria vida.</p>

<h2>Explicação científica simplificada</h2>

<p>A ansiedade é uma resposta natural do organismo diante de situações percebidas como ameaçadoras. Ela prepara o corpo para reagir rapidamente, aumentando o estado de alerta. Esse mecanismo foi essencial para a sobrevivência humana ao longo da evolução.</p>

<p>Entretanto, quando o cérebro interpreta como perigosas situações que não representam uma ameaça real, esse sistema permanece ativado por mais tempo do que deveria. Como consequência, surgem preocupações excessivas, tensão muscular, dificuldade para relaxar, necessidade de antecipar problemas e tentativa constante de controlar acontecimentos futuros.</p>

<p>Do ponto de vista psicológico, o controle funciona como uma estratégia para reduzir temporariamente a incerteza. Quando tudo parece estar sob controle, a ansiedade diminui por alguns instantes. Porém, essa sensação é passageira. Logo surgem novas dúvidas, novos cenários imaginários e novas necessidades de controle.</p>

<p>Esse ciclo acaba reforçando o comportamento. A pessoa acredita que só conseguiu evitar problemas porque permaneceu vigilante o tempo todo, quando, na verdade, grande parte das situações tem um curso natural independente do quanto tentamos controlá-las.</p>

<p>Pesquisas em psicologia mostram que a intolerância à incerteza está presente em diversos quadros relacionados à ansiedade. Quanto maior a dificuldade em aceitar que nem tudo pode ser previsto, maior tende a ser o sofrimento emocional.</p>

<h2>Análise profissional aplicada ao tema</h2>

<p>Na prática clínica, é comum encontrar pessoas que associam seu valor pessoal à capacidade de prever erros, antecipar dificuldades e impedir que algo saia do planejado. Muitas desenvolveram essa forma de funcionamento ao longo da infância ou adolescência, especialmente em ambientes marcados por críticas constantes, excesso de cobrança, instabilidade ou experiências traumáticas.</p>

<p>Em alguns casos, controlar tudo foi uma maneira de encontrar segurança em contextos imprevisíveis. Esse recurso pode ter sido útil em determinado momento da vida, mas, na fase adulta, passa a gerar desgaste emocional, conflitos nos relacionamentos, procrastinação e dificuldade para descansar.</p>

<p>Também é frequente que o controle apareça disfarçado de responsabilidade excessiva. A pessoa assume tarefas que poderiam ser compartilhadas, revisa o trabalho inúmeras vezes, sente dificuldade em delegar funções e acredita que somente ela conseguirá fazer tudo corretamente.</p>

<p>Outro aspecto importante é o impacto desse comportamento sobre as relações interpessoais. Familiares, amigos e parceiros podem sentir que não há espaço para espontaneidade, pois qualquer mudança de planos gera desconforto ou necessidade imediata de reorganização.</p>

<p>Do ponto de vista emocional, viver tentando controlar tudo exige enorme quantidade de energia mental. O cérebro permanece constantemente em estado de vigilância, como se precisasse antecipar todos os riscos possíveis. Esse padrão contribui para fadiga, irritabilidade, dificuldade para dormir e sensação permanente de preocupação.</p>

<h2>Aplicações práticas e orientações</h2>

<ul>
<li>Observe quais situações despertam maior necessidade de controle e anote os pensamentos que surgem nesses momentos.</li>

<li>Pergunte-se se existe uma ameaça real ou apenas uma possibilidade imaginada pela ansiedade.</li>

<li>Aprenda a diferenciar aquilo que depende diretamente das suas ações daquilo que está fora do seu alcance.</li>

<li>Pratique pequenas experiências de flexibilidade, permitindo que alguns detalhes aconteçam de maneira diferente do planejado.</li>

<li>Evite buscar garantias absolutas antes de tomar decisões. Na vida, praticamente nenhuma escolha oferece certeza completa.</li>

<li>Reserve momentos para atividades que promovam relaxamento, como caminhadas, exercícios físicos, leitura ou práticas de respiração.</li>

<li>Desenvolva autocompaixão. Errar faz parte da experiência humana e não define o seu valor como pessoa.</li>

<li>Quando perceber que está tentando controlar tudo ao mesmo tempo, concentre sua atenção apenas na próxima ação possível, em vez de tentar resolver todo o futuro de uma só vez.</li>
</ul>

<h2>Pontes para psicoterapia</h2>

<p>A psicoterapia oferece um espaço seguro para compreender por que a necessidade de controle se tornou tão intensa. Em vez de apenas ensinar técnicas para aliviar sintomas, o processo terapêutico busca identificar a origem dos padrões emocionais, das crenças e das experiências que contribuíram para essa forma de funcionamento.</p>

<p>Ao longo do acompanhamento, é possível desenvolver maior tolerância às incertezas, fortalecer recursos internos para lidar com situações imprevisíveis e construir maneiras mais saudáveis de enfrentar desafios cotidianos.</p>

<p>Muitas pessoas descobrem que, por trás do desejo de controlar tudo, existe medo de rejeição, fracasso, abandono ou perda. Quando esses conteúdos são compreendidos e elaborados, a necessidade de controle tende a diminuir naturalmente, abrindo espaço para relações mais leves e uma vida emocional mais equilibrada.</p>

<p>A psicoterapia também auxilia no desenvolvimento do autoconhecimento, permitindo reconhecer limites, necessidades emocionais e formas mais flexíveis de interpretar os acontecimentos. Isso não significa perder responsabilidade ou organização, mas aprender a distinguir aquilo que realmente depende de você daquilo que faz parte da imprevisibilidade da vida.</p>

<h2>Conclusão</h2>

<p>Tentar controlar tudo pode parecer uma forma de proteção, mas frequentemente se transforma em uma fonte constante de ansiedade. A vida é marcada por mudanças, imprevistos e situações que escapam ao nosso domínio. Quanto maior a tentativa de eliminar completamente a incerteza, maior tende a ser o sofrimento.</p>

<p>Assim como um navegador não controla o vento, mas aprende a ajustar as velas, também podemos desenvolver habilidades para enfrentar os desafios da vida sem precisar dominar cada detalhe do caminho. O verdadeiro equilíbrio não está em controlar tudo, mas em fortalecer a capacidade de lidar com aquilo que não podemos controlar.</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);


/* ==========================================
   INICIALIZAÇÃO GERAL DA PÁGINA
   ========================================== */
document.addEventListener('DOMContentLoaded', () => {
  loadPosts();
});

/* ==========================================
   CONFIGURA SEO E INSERE CONTEÚDO DO ARTIGO
   ========================================== */
document.addEventListener("DOMContentLoaded", () => {
  // SEO
  document.title = ARTICLE.title + " | William Brioli";
  document.getElementById("metaTitle").textContent = ARTICLE.title;
  document.getElementById("metaDescription").content = ARTICLE.description;
  document.getElementById("ogTitle").content = ARTICLE.title;
  document.getElementById("ogDescription").content = ARTICLE.description;
  document.getElementById("ogImage").content = ARTICLE.cover;
  document.getElementById("canonicalLink").href = ARTICLE.canonical;

  // Título no artigo
  document.getElementById("articleTitle").textContent = ARTICLE.title;

  // Capa
  const coverImg = document.getElementById("articleCover");
  if (ARTICLE.showCover && ARTICLE.cover.trim() !== "") {
    coverImg.src = ARTICLE.cover;
    coverImg.alt = ARTICLE.alt || "";
    coverImg.style.display = "block";
  } else {
    coverImg.style.display = "none";
  }

  // Data + autor
  const date = new Date(ARTICLE.date);
  document.getElementById("articleMeta").textContent =
    date.toLocaleDateString("pt-BR", {
      day: "2-digit",
      month: "long",
      year: "numeric"
    }) + " • por " + ARTICLE.author;

  // Conteúdo do artigo
  document.getElementById("articleContent").innerHTML = ARTICLE.content;
});
</script>


<!-- Carrega o arquivo com textos e botões -->
<script src="/js/site-data.js"></script>


<!-- ==========================================
     SCRIPT QUE INJETA TEXTOS DOS BOTÕES DO SITE_DATA
     ========================================== -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  // Botão final do artigo
  const btn = document.getElementById("btnAgendarAtendimento");
  if (btn && window.SITE_DATA?.buttons?.articleCTA) {
    btn.textContent = window.SITE_DATA.buttons.articleCTA;
  }

  // Botão do modal de WhatsApp
  const modalWA = document.getElementById("postModalWhatsApp");
  if (modalWA && window.SITE_DATA?.buttons?.modalCTA) {
    modalWA.textContent = window.SITE_DATA.buttons.modalCTA;
  }

  // Botão inferior "Fechar"
  const modalCloseBtn = document.getElementById("postModalCloseBottom");
  if (modalCloseBtn && window.SITE_DATA?.buttons?.closeModal) {
    modalCloseBtn.textContent = window.SITE_DATA.buttons.closeModal;
  }
});
</script>
