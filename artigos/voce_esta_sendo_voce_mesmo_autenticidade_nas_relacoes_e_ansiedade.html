    content: `


Ela chegou na sessão dizendo: “Eu converso com todo mundo, mas parece que ninguém me conhece de verdade.” No trabalho, era comunicativa. Nas redes sociais, presente. Nos grupos, participativa. Mas, por dentro, carregava uma sensação constante de vazio — como se estivesse sempre representando um papel. Ao longo da conversa, surgiu uma pergunta simples, mas desconcertante: “Se eu tirar todas as máscaras, alguém ainda vai querer ficar?” Essa dúvida, silenciosa e comum, revela um dos maiores dilemas emocionais da atualidade: queremos conexão, mas nem sempre estamos sendo quem realmente somos.</p>

<h2>Explicação científica simplificada</h2>
<p>A necessidade de conexão é uma das bases do funcionamento humano. Segundo a teoria do apego, desenvolvida por John Bowlby e aprofundada por Mary Ainsworth, o ser humano busca vínculos seguros desde a infância. Esses vínculos influenciam diretamente a forma como nos relacionamos na vida adulta.</p>

<p>Quando crescemos em ambientes onde a aceitação está condicionada — ou seja, quando precisamos “ser algo” para sermos amados — desenvolvemos padrões de adaptação emocional. Isso pode levar à criação de um “falso self”, conceito introduzido pelo psicanalista Donald Winnicott. O falso self surge como uma forma de proteção: ajustamos nosso comportamento para sermos aceitos, mesmo que isso signifique nos afastar da nossa autenticidade.</p>

<p>Além disso, estudos em psicologia social mostram que a incongruência entre o “eu real” e o “eu ideal” está associada ao aumento de ansiedade e sofrimento emocional. Quando existe uma distância grande entre quem somos e quem mostramos ser, o corpo e a mente entram em estado de tensão constante.</p>

<h2>Análise profissional aplicada ao tema</h2>
<p>Na prática clínica, é comum encontrar pessoas que relatam dificuldade em se conectar profundamente com os outros, mesmo tendo vida social ativa. Isso acontece porque conexão emocional não depende apenas de presença, mas de autenticidade.</p>

<p>O conteúdo abordado por Alana Anijar, no “Guia nada básico para conexões autênticas”, dialoga diretamente com esse ponto: a ideia de que relações verdadeiras exigem exposição emocional — algo que muitas pessoas evitam por medo de rejeição.</p>

<p>Do ponto de vista psicológico, evitar ser autêntico pode gerar um ciclo de sofrimento:</p>
<ul>
  <li>A pessoa se adapta para ser aceita</li>
  <li>É aceita, mas não como realmente é</li>
  <li>Sente-se vazia ou desconectada</li>
  <li>Reforça o comportamento de adaptação</li>
</ul>

<p>Esse padrão pode levar a quadros de ansiedade, baixa autoestima e dificuldade em estabelecer vínculos profundos. Em contextos mais intensos, pode até contribuir para sintomas depressivos.</p>

<h2>Aplicações práticas e orientações</h2>
<ul>
  <li>Observe em quais ambientes você sente que precisa “atuar” para ser aceito</li>
  <li>Identifique pequenas situações onde pode ser mais autêntico, começando com segurança</li>
  <li>Pratique expressar opiniões e sentimentos de forma gradual, sem necessidade de exposição extrema</li>
  <li>Perceba se suas relações são baseadas em troca real ou apenas conveniência social</li>
  <li>Reflita: você está buscando conexão ou aprovação?</li>
  <li>Desenvolva consciência emocional — nomear o que sente é o primeiro passo para se posicionar</li>
</ul>

<h2>Pontes para psicoterapia</h2>
<p>A psicoterapia é um espaço seguro para investigar essas questões com profundidade. Dentro de abordagens como a psicanálise, é possível compreender como essas adaptações foram construídas ao longo da vida e quais experiências contribuíram para o desenvolvimento do falso self.</p>

<p>O processo terapêutico permite que a pessoa reconstrua sua relação consigo mesma, fortalecendo sua identidade e ampliando sua capacidade de se posicionar de forma mais autêntica. Com o tempo, isso se reflete diretamente na qualidade das relações — tornando-as mais verdadeiras, leves e satisfatórias.</p>

<p>Além disso, a terapia ajuda a desenvolver tolerância emocional: a capacidade de lidar com o risco de não ser aceito sem precisar se anular.</p>

<h2>Conclusão</h2>
<p>Buscar conexão sem autenticidade é como tentar encher um copo com um furo no fundo: por mais que algo entre, nunca parece suficiente. Relações verdadeiras não se constroem a partir da perfeição, mas da presença real.</p>

<p>Ser você mesmo pode gerar desconforto no início — especialmente se você passou anos se adaptando —, mas é exatamente esse movimento que permite construir vínculos mais profundos e significativos. A pergunta que fica não é apenas “quem vai me aceitar?”, mas sim: “eu estou disposto a me mostrar de verdade?”</p>

<script>
/*
  Aqui começam várias funções importantes para fazer a página funcionar.
  Elas cuidam de:
  - transformar markdown em HTML
  - carregar lista de posts
  - abrir e fechar o modal
  - inserir conteúdo na página
*/

/* ==========================================
   FUNÇÃO: simpleMarkdownToHtml()
   Serve para transformar markdown simples em HTML.
   ========================================== */
function simpleMarkdownToHtml(md) {
  if (!md) return '';

  // Troca quebras de linha antigas por novas
  let text = md.replace(/\r\n/g, '\n');

  // Títulos de vários níveis
  text = text.replace(/^### (.*)$/gm, '<h3>$1</h3>');
  text = text.replace(/^## (.*)$/gm, '<h2>$1</h2>');
  text = text.replace(/^# (.*)$/gm, '<h2>$1</h2>');

  // Negrito **
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Itálico *
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Transformar listas
  text = text.replace(/^[\-\*] (.*)$/gm, '<li>$1</li>');
  text = text.replace(/(<li>.*<\/li>\n?)+/gm, match => `<ul>${match}</ul>`);

  // Transformar blocos separados por linha vazia em parágrafos
  const parts = text.split(/\n{2,}/).map(block => {
    if (/^<h[23]>/.test(block) || /^<ul>/.test(block)) {
      return block;
    }
    return `<p>${block.trim()}</p>`;
  });

  return parts.join('\n');
}


/* ==========================================
   CARREGAMENTO DE POSTS
   Lê o arquivo posts.json e cria os cards na página.
   ========================================== */

let POSTS_CACHE = [];

async function loadPosts() {
  const grid = document.getElementById('postsGrid');
  const msgEl = document.getElementById('postsMessage');

  if (!grid || !msgEl) return;

  msgEl.style.display = 'none';
  msgEl.textContent = '';

  try {
    // Busca o arquivo que contém os posts
    const response = await fetch('/posts/posts.json', { cache: 'no-store' });

    if (!response.ok) {
      throw new Error('Não foi possível carregar a lista de artigos.');
    }

    const posts = await response.json();

    if (!Array.isArray(posts) || posts.length === 0) {
      msgEl.style.display = 'block';
      msgEl.textContent = 'Ainda não há artigos publicados.';
      return;
    }

    // Ordena do mais recente para o mais antigo
posts.sort((a, b) => new Date(b.date) - new Date(a.date));

POSTS_CACHE = posts;
renderPosts(posts, grid);

  } catch (err) {
    console.error(err);
    msgEl.style.display = 'block';
    msgEl.textContent = 'Ocorreu um problema ao carregar artigos.';
  }
}


/* ==========================================
   FUNÇÃO: renderPosts()
   Cria os cards dinamicamente dentro do grid.
   ========================================== */
function renderPosts(posts, container) {
  container.innerHTML = '';

  posts.forEach(post => {
    const card = document.createElement('article');
    card.className = 'post-card';

    // Capa
    if (post.cover) {
      const img = document.createElement('img');
      img.src = post.cover;
      img.alt = post.title || '';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'post-card-body';

    // Tag (ex: Psicologia)
    if (Array.isArray(post.tags) && post.tags.length > 0) {
      const tag = document.createElement('span');
      tag.className = 'post-tag';
      tag.textContent = post.tags[0];
      body.appendChild(tag);
    }

    // Título
    const h3 = document.createElement('h3');
    h3.textContent = post.title || 'Artigo sem título';
    body.appendChild(h3);

    // Meta (data + autor)
    const meta = document.createElement('div');
    meta.className = 'post-meta';
    meta.textContent = formatPostMeta(post);
    body.appendChild(meta);

    // Resumo
    if (post.excerpt) {
      const excerpt = document.createElement('div');
      excerpt.className = 'post-excerpt';
      excerpt.textContent = post.excerpt;
      body.appendChild(excerpt);
    }

    // Botão do card
    const footer = document.createElement('div');
    footer.className = 'post-card-footer';

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'btn';
    btn.textContent = window.SITE_DATA.buttons.readMore;
    // O texto vem do arquivo site-data.js

    btn.addEventListener('click', () => {
      // abre a página do artigo
      if (post.html) {
        window.location.href = "/" + post.html;
      }
    });

    footer.appendChild(btn);
    body.appendChild(footer);
    card.appendChild(body);
    container.appendChild(card);
  });
}


/* ==========================================
   FUNÇÃO: formatPostMeta()
   Formata a data + autor do post
   ========================================== */
function formatPostMeta(post) {
  let parts = [];

  if (post.date) {
    const d = new Date(post.date);
    if (!isNaN(d)) {
      const formatted = d.toLocaleDateString('pt-BR', {
        day: '2-digit',
        month: 'long',
        year: 'numeric'
      });
      parts.push(formatted);
    }
  }

  if (post.author) {
    parts.push('por ' + post.author);
  }

  return parts.join(' • ');
}


/* ==========================================
   FUNÇÃO DO MODAL (abrir e fechar)
   ========================================== */
const modalBackdrop = document.getElementById('postModalBackdrop');
const modalTitle = document.getElementById('postModalTitle');
const modalMeta = document.getElementById('postModalMeta');
const modalCover = document.getElementById('postModalCover');
const modalContent = document.getElementById('postModalContent');
const modalClose = document.getElementById('postModalClose');
const modalCloseBottom = document.getElementById('postModalCloseBottom');
const modalWhatsApp = document.getElementById('postModalWhatsApp');

async function openPostModal(post) {
  if (!post) return;

  modalTitle.textContent = post.title || '';
  modalMeta.textContent = formatPostMeta(post);

  if (post.cover) {
    modalCover.style.display = 'block';
    modalCover.innerHTML = `<img src="${post.cover}">`;
  } else {
    modalCover.style.display = 'none';
  }

  modalContent.innerHTML = '<p>Carregando conteúdo...</p>';

  if (!post.file) {
    modalContent.innerHTML = '<p>Conteúdo não encontrado.</p>';
  } else {
    try {
      const resp = await fetch(post.file, { cache: 'no-store' });
      const md = await resp.text();
      modalContent.innerHTML = simpleMarkdownToHtml(md);
    } catch {
      modalContent.innerHTML = '<p>Erro ao carregar conteúdo.</p>';
    }
  }

  modalWhatsApp.onclick = () => {
    window.open(waLink('generic'), '_blank');
  };

  modalBackdrop.classList.add('open');
  modalBackdrop.setAttribute('aria-hidden', 'false');
  document.body.style.overflow = 'hidden';
}

function closePostModal() {
  modalBackdrop.classList.remove('open');
  modalBackdrop.setAttribute('aria-hidden', 'true');
  document.body.style.overflow = '';
}

modalClose.addEventListener('click', closePostModal);
modalCloseBottom.addEventListener('click', closePostModal);
