<style>
  .agenda-card {

    min-height: unset !important;

  .agenda-card iframe {
  width: 100%;
  height: 100px; /* altura inicial mínima */

  border-radius: 16px;
}

  </div>
</main>
    
   
   
  

<!-- CONTATO / RODAPÉ -->
    <footer id="contato" class="site-footer">
  <div class="container section-card" id="footerContainer">

  </div>
</footer>  


  

<script src="/js/config-whatsapp.js"></script>
<!-- Script com configuração do WhatsApp (número, mensagens, etc.) -->

<script>
  document.addEventListener("DOMContentLoaded", carregarMenu);

</script>


<!-- Carrega o arquivo com textos e botões -->
<script src="/js/site-data.js"></script>




 <!-- Função para ajustar altura do card do calenrário automaticamente - trabalha em conjunto com função no html script function enviarAltura --> 
  
<script>
  window.addEventListener("message", function(event) {
    if (event.data.type === "resizeAgenda") {
      const iframe = document.getElementById("agendaFrame");
      iframe.style.height = event.data.height + "px";
    }
  });
</script>
